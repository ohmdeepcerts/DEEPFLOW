<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<title>Client Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --bg:#f0f4f8;--s1:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --acc:#2563eb;--acc2:#1d4ed8;--acc-soft:#eff6ff;
  --green:#16a34a;--gbg:#f0fdf4;--gbd:#bbf7d0;
  --red:#dc2626;--rbg:#fef2f2;--rbd:#fecaca;
  --yel:#d97706;--ybg:#fffbeb;--ybd:#fde68a;
  --pur:#7c3aed;--pbg:#f5f3ff;--pbd:#ddd6fe;
  --r:14px;--r2:10px;--r3:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 20px rgba(0,0,0,.1);--sh3:0 8px 40px rgba(0,0,0,.16);
  --fnt:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--fnt);min-height:100vh;-webkit-font-smoothing:antialiased}
/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-l{display:flex;align-items:center;gap:9px}.logo{width:32px;height:32px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;flex-shrink:0}
.hdr-co{font-size:15px;font-weight:800;letter-spacing:-.3px}.hdr-r{display:flex;align-items:center;gap:8px}
.hbadge{background:var(--acc-soft);color:var(--acc);font-size:10px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid #bfdbfe;white-space:nowrap}
.hname{font-size:11px;color:var(--txt3);font-weight:500}
@media(max-width:480px){.hname{display:none}}
/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:56px;z-index:100}
.nav::-webkit-scrollbar{display:none}
.tab{padding:12px 14px;font-size:12px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s;user-select:none;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--txt2)}.tab.active{color:var(--acc);border-color:var(--acc)}
@media(min-width:580px){.tab{padding:13px 18px;font-size:13px}}
/* LAYOUT */
.main{max-width:900px;margin:0 auto;padding:14px}
@media(min-width:600px){.main{padding:22px 20px}}
/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 55%,#60a5fa 100%);border-radius:var(--r);padding:22px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%}
.hero-ey{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:9px}
.hero-n{font-size:20px;font-weight:900;letter-spacing:-.3px;margin-bottom:4px}
.hero-s{font-size:12px;opacity:.8;line-height:1.5}
.hero-row{margin-top:16px;display:flex;gap:7px;flex-wrap:wrap}
.hbtn{display:inline-flex;align-items:center;gap:4px;border-radius:var(--r2);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);color:#fff;transition:.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;font-family:var(--fnt)}
.hbtn:hover{background:rgba(255,255,255,.25)}.hbtn.p{background:#fff;color:var(--acc);border-color:transparent}.hbtn.p:hover{background:#f0f9ff}
@media(min-width:580px){.hero{padding:28px 32px}.hero-n{font-size:24px}}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px}
@media(min-width:520px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:13px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.stat-ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.stat-v{font-size:22px;font-weight:900;line-height:1}.stat-l{font-size:10px;color:var(--txt3);margin-top:2px;font-weight:500}
.sa .stat-ic{background:var(--acc-soft)}.sa .stat-v{color:var(--acc)}.sb .stat-ic{background:var(--gbg)}.sb .stat-v{color:var(--green)}
.sc .stat-ic{background:var(--ybg)}.sc .stat-v{color:var(--yel)}.sd .stat-ic{background:var(--rbg)}.sd .stat-v{color:var(--red)}
/* CERT EXPIRY WIDGET */
.cew{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:16px;box-shadow:var(--sh)}
.cew-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.cew-t{font-size:13px;font-weight:800}
.cew-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cew-b{border-radius:var(--r2);padding:12px 8px;text-align:center;cursor:pointer;transition:.15s}
.cew-b:hover{opacity:.85}.cew-n{font-size:26px;font-weight:900;line-height:1}.cew-l{font-size:10px;font-weight:600;margin-top:3px}
.cb-e{background:var(--rbg);border:1px solid var(--rbd)}.cb-e .cew-n,.cb-e .cew-l{color:var(--red)}
.cb-s{background:var(--ybg);border:1px solid var(--ybd)}.cb-s .cew-n,.cb-s .cew-l{color:var(--yel)}
.cb-o{background:var(--gbg);border:1px solid var(--gbd)}.cb-o .cew-n,.cb-o .cew-l{color:var(--green)}
/* SECTION */
.sec{margin-bottom:22px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px;gap:8px;flex-wrap:wrap}
.sec-t{font-size:14px;font-weight:800;display:flex;align-items:center;gap:6px}
.sec-n{font-size:10px;font-weight:700;color:var(--txt3);background:var(--s3);border-radius:10px;padding:2px 7px}
/* ALERT */
.alert{display:flex;align-items:flex-start;gap:8px;padding:10px 13px;border-radius:var(--r2);margin-bottom:7px;font-size:12px;font-weight:500;line-height:1.4}
.al-r{background:var(--rbg);border:1px solid var(--rbd);color:var(--red)}.al-y{background:var(--ybg);border:1px solid var(--ybd);color:var(--yel)}
/* SORT */
.sort-bar{display:flex;align-items:center;gap:7px;margin-bottom:11px;flex-wrap:wrap}
.sl{font-size:11px;color:var(--txt3);font-weight:600;white-space:nowrap}
.ss{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:5px 9px;font-size:12px;color:var(--txt);cursor:pointer;outline:none;font-family:var(--fnt)}
/* CERT CARD */
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:7px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px;transition:.2s}
.cc:hover{box-shadow:var(--sh2)}.cc-ic{width:42px;height:42px;border-radius:11px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cc-body{flex:1;min-width:0}.cc-t{font-size:13px;font-weight:700;margin-bottom:2px}.cc-a{font-size:11px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-m{display:flex;align-items:center;gap:5px;margin-top:4px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.p-ok{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}.p-s{background:var(--ybg);color:var(--yel);border:1px solid var(--ybd)}.p-e{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}.p-n{background:var(--s3);color:var(--txt3);border:1px solid var(--border)}
.dl{display:inline-flex;align-items:center;gap:4px;background:var(--acc);color:#fff;border:none;border-radius:var(--r3);padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:.15s;font-family:var(--fnt)}
.dl:hover{background:var(--acc2)}.dl.g{background:var(--s2);color:var(--txt2);border:1px solid var(--border)}.dl.g:hover{background:var(--s3)}.dl.sm{padding:5px 9px;font-size:10px}
/* JOB CARD */
.jc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:9px;box-shadow:var(--sh);overflow:hidden;transition:.2s}
.jc:hover{box-shadow:var(--sh2)}.jc-hd{padding:13px 15px;display:flex;align-items:flex-start;gap:9px}
.jc-l{flex:1;min-width:0}
.jc-num{display:inline-block;font-size:10px;font-weight:700;color:var(--acc);font-family:ui-monospace,monospace;background:var(--acc-soft);padding:2px 6px;border-radius:4px;margin-bottom:5px}
.jc-addr{font-size:14px;font-weight:700;margin-bottom:2px;line-height:1.3}.jc-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.jc-strip{display:flex;align-items:center;gap:5px;padding:7px 15px;background:var(--s2);border-top:1px solid var(--border);flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--txt2);font-weight:500}.cdot{color:var(--border2)}
.jc-body{padding:13px 15px;border-top:1px solid var(--border)}
.jbadge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bp{background:var(--ybg);color:var(--yel);border:1px solid var(--ybd)}.bi{background:var(--acc-soft);color:var(--acc);border:1px solid #bfdbfe}
.bd{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}.bv{background:var(--pbg);color:var(--pur);border:1px solid var(--pbd)}.bc{background:var(--s3);color:var(--txt3);border:1px solid var(--border)}
/* INVOICE */
.ic{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:13px 15px;margin-bottom:7px;box-shadow:var(--sh);display:flex;align-items:center;gap:11px;transition:.2s}
.ic:hover{box-shadow:var(--sh2)}.ic-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ic-body{flex:1;min-width:0}.ic-num{font-size:12px;font-weight:700;font-family:ui-monospace,monospace;margin-bottom:2px}.ic-desc{font-size:11px;color:var(--txt3)}
.ic-r{text-align:right;flex-shrink:0}.ic-amt{font-size:17px;font-weight:900}.ic-lbl{font-size:9px;color:var(--txt3);margin-top:1px}
/* BANK CARD */
.bank-card{background:linear-gradient(135deg,#1e293b,#334155);border-radius:var(--r2);padding:16px;color:#fff;margin-top:14px;position:relative;overflow:hidden}
.bank-card::before{content:'';position:absolute;right:-20px;top:-20px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%}
.bank-t{font-size:9px;font-weight:700;opacity:.55;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.bank-n{font-size:15px;font-weight:700;margin-bottom:5px}
.bank-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:3px}.bank-f{font-size:11px;opacity:.7}
.bank-f strong{font-size:12px;color:#fff;opacity:1}
.bank-link{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:var(--r3);padding:5px 11px;font-size:11px;font-weight:600;color:#fff;margin-top:7px;word-break:break-all;cursor:pointer}
/* STATEMENT */
.stmt-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:12px 15px;margin-bottom:6px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh)}
.stmt-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
/* DOCS */
.doc-row{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:12px 15px;margin-bottom:6px;display:flex;align-items:center;gap:11px;box-shadow:var(--sh);transition:.2s}
.doc-row:hover{box-shadow:var(--sh2)}
/* PROP GROUP */
.pg{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh)}
.pg-hd{padding:11px 15px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.pg-addr{font-size:13px;font-weight:700}.pg-m{font-size:11px;color:var(--txt3)}.pg-body{padding:7px 10px}
/* REQUEST */
.rc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:18px;box-shadow:var(--sh)}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fl{font-size:11px;font-weight:600;color:var(--txt2)}
.fi{background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r2);padding:10px 12px;font-size:14px;color:var(--txt);outline:none;transition:.15s;font-family:var(--fnt);width:100%}
.fi:focus{border-color:var(--acc);background:#fff}
textarea.fi{resize:vertical;min-height:78px}select.fi{cursor:pointer}
.fgrid{display:grid;grid-template-columns:1fr;gap:11px;margin-bottom:11px}
@media(min-width:500px){.fgrid-2{grid-template-columns:1fr 1fr}}
.fsub{background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:12px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:var(--fnt);margin-top:4px;transition:.15s}
.fsub:hover{background:var(--acc2)}.fnote{font-size:11px;color:var(--txt3);text-align:center;margin-top:7px;line-height:1.5}
/* PHOTO */
.pt{width:70px;height:70px;object-fit:cover;border-radius:7px;cursor:pointer;border:2px solid var(--border);transition:.2s;flex-shrink:0}
.pt:hover{transform:scale(1.06)}@media(min-width:380px){.pt{width:78px;height:78px}}
/* EMPTY/FOOTER/SPINNER */
.empty{text-align:center;padding:44px 20px;color:var(--txt3)}.ei{font-size:42px;margin-bottom:11px}.et{font-size:14px;font-weight:700;color:var(--txt2);margin-bottom:4px}.es{font-size:12px;line-height:1.5}
.footer{text-align:center;padding:22px 14px;color:var(--txt3);font-size:11px;border-top:1px solid var(--border);margin-top:8px}
.spin{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:80px auto}@keyframes sp{to{transform:rotate(360deg)}}
/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:9px 18px;border-radius:24px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh3)}#toast.show{opacity:1}
/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9998;display:none;align-items:center;justify-content:center}#lb.show{display:flex}
#lb img{max-width:94vw;max-height:90vh;border-radius:var(--r2);box-shadow:var(--sh3)}
#lb-x{position:absolute;top:14px;right:16px;color:#fff;font-size:26px;cursor:pointer;font-weight:700;line-height:1;z-index:1}
/* LOADING OVERLAY */
.loading{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--txt3)}
.loading::before{content:'';width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .6s linear infinite;flex-shrink:0}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l"><div class="logo">DF</div><div class="hdr-co" id="hdr-co">DeepFlow</div></div>
  <div class="hdr-r"><div class="hname" id="hdr-name"></div><div class="hbadge" id="portal-badge">Portal</div></div>
</div>
<div class="nav" id="nav" style="display:none">
  <div class="tab active" data-t="overview" onclick="go('overview')">📊 Overview</div>
  <div class="tab" data-t="jobs"     onclick="go('jobs')">🔧 Jobs</div>
  <div class="tab" data-t="certs"    onclick="go('certs')">📋 Certificates</div>
  <div class="tab" data-t="invoices" onclick="go('invoices')">🧾 Invoices</div>
  <div class="tab" data-t="payments" onclick="go('payments')">💳 Payments</div>
  <div class="tab" data-t="docs"     onclick="go('docs')">📁 Documents</div>
  <div class="tab" data-t="request"  onclick="go('request')">➕ Request</div>
</div>
<div class="main" id="main"><div class="spin"></div></div>
<div class="footer">
  <div style="font-weight:900;font-size:11px;letter-spacing:.5px">DEEPFLOW</div>
  <div style="margin-top:3px">Secure Client Portal · <span id="footer-co"></span></div>
</div>
<div id="lb" onclick="closeLb()"><div id="lb-x" onclick="closeLb()">✕</div><img id="lb-img" src="" alt=""></div>
<div id="toast"></div>

<script>
// ── CORE ─────────────────────────────────────────────────────────────────────
const SB_URL='https://dzqyqpuhxdrrpipbehpk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXlxcHVoeGRycnBpcGJlaHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzMjksImV4cCI6MjA4ODQ1MjMyOX0.7ObsuqKv5gNX5r7Pz1x1gyGgugcX2W0zw3d9hC6osvI';

async function sb(path,opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:opts.method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',
      'Prefer':opts.prefer||(opts.method==='POST'?'return=representation':'')},
    body:opts.body!==undefined?JSON.stringify(opts.body):undefined,
  });
  if(!r.ok)throw new Error(await r.text());
  const t=await r.text();return t?JSON.parse(t):null;
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _fix(j){
  if(!j||typeof j!=='object')return j;
  const M={jobnum:'jobNum',certtypes:'certTypes',timeslot:'timeSlot',landlordname:'landlordName',
    agencyname:'agencyName',agentname:'agentName',issuedate:'issueDate',expirydate:'expiryDate',
    certnum:'certNum',noexpiry:'noExpiry',jobid:'jobId',clientname:'clientName',duedate:'dueDate',
    createdat:'createdAt',bankname:'bankName',bankacc:'bankAcc',banksort:'bankSort',bankref:'bankRef',
    invoicetype:'invoiceType',billtoname:'billToName',billtoaddress:'billToAddress',
    jobaddress:'jobAddress',agentname:'agentName',propertyaddress:'propertyAddress'};
  const r={};for(const[k,v]of Object.entries(j))r[M[k]||k]=v;return r;
}

function dd(d){return d?Math.ceil((new Date(d)-new Date())/86400000):null}
function fd(d){return d?new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}
function fgbp(n){return'£'+(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}
function calcTotal(inv){
  const it=typeof inv.items==='string'?JSON.parse(inv.items||'[]'):(inv.items||[]);
  let sub=0,vat=0;
  it.forEach(x=>{const l=(x.qty||1)*(x.unit||0);sub+=l;if(x.vat)vat+=l*(_S.vatRate||20)/100;});
  return{sub,vat,grand:sub+vat};
}

// ── STATE ─────────────────────────────────────────────────────────────────────
let _d=null, _S={}, _cs='expiry', _cd='asc';
const P=new URLSearchParams(location.search);
const token=P.get('id'), ptype=P.get('type')||'landlord';

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  if(!token){showErr('Invalid Link','This portal link is invalid or has expired.');return;}
  try{
    let entity,jobs=[],attachments=[],certs=[],invoices=[];

    // Load company settings first (needed for PDF generation)
    try{
      const s=await sb(`app_settings?select=value&key=eq.settings`);
      if(s?.[0]?.value){_S=typeof s[0].value==='string'?JSON.parse(s[0].value):s[0].value;}
    }catch(_){}

    if(ptype==='agency'){
      const rows=await sb(`agencies?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','This link is invalid or has expired.');return;}
      entity=_fix(rows[0]);
      document.getElementById('portal-badge').textContent='🏢 Agency';
      document.title=`${entity.name} — Portal`;
      jobs=await fetchJobs('agencyname',entity.name,entity.id);
    } else if(ptype==='agent'){
      const agentName=P.get('name');
      if(!agentName){showErr('Invalid Link','Please regenerate this link from the office.');return;}
      entity={name:decodeURIComponent(agentName),type:'agent',id:token};
      document.getElementById('portal-badge').textContent='👤 Agent';
      document.title=`${entity.name} — Portal`;
      jobs=await fetchJobs('agentname',entity.name,entity.id);
    } else {
      const rows=await sb(`persons?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','This link is invalid or has expired. Contact your service provider.');return;}
      entity=_fix(rows[0]);
      document.getElementById('portal-badge').textContent='🏠 Landlord';
      document.title=`${entity.name} — Portal`;
      jobs=await fetchJobs('landlordname',entity.name,entity.id);
    }

    // Fetch certs, attachments, invoices in parallel
    if(jobs.length){
      const idL=jobs.map(j=>`"${j.id}"`).join(',');
      const nL=(entity.name||'').toLowerCase();
      const [ra,rc,ri]=await Promise.all([
        sb(`attachments?jobid=in.(${idL})&select=*`).catch(()=>[]),
        sb(`certs?jobid=in.(${idL})&select=*`).catch(()=>[]),
        sb(`invoices?select=*`).catch(()=>[]),
      ]);
      attachments=(ra||[]).map(_fix);
      certs=(rc||[]).map(_fix);
      // Filter invoices by entity name
      invoices=(ri||[]).map(_fix).filter(inv=>{
        const n=(inv.clientName||inv.landlordName||inv.agencyName||inv.agentName||inv.billToName||'').toLowerCase();
        return n.includes(nL)||nL.includes(n.split(' ')[0]);
      });
    }

    const coName=_S.coName||'Your Service Provider';
    document.getElementById('hdr-co').textContent=coName;
    document.getElementById('hdr-name').textContent=entity.name;
    document.getElementById('footer-co').textContent=coName;

    _d={name:entity.name,type:ptype,jobs,attachments,certs,invoices,token,coName,entity};
    document.getElementById('nav').style.display='flex';
    go('overview');
  }catch(err){
    console.error(err);
    showErr('Connection Error','Could not load your portal. Please check your connection and try again.');
  }
}

async function fetchJobs(col,name,id){
  // Try ilike match by name (works if RLS allows anon read)
  try{
    const raw=await sb(`jobs?${col}=ilike.${encodeURIComponent(name)}&order=date.desc&select=*`);
    if(Array.isArray(raw)&&raw.length>0) return raw.map(_fix);
  }catch(e){console.warn('[Portal] name fetch failed',e);}
  // Fallback: try client_person_id for landlords
  if(col==='landlordname'&&id){
    try{
      const raw=await sb(`jobs?client_person_id=eq.${encodeURIComponent(id)}&order=date.desc&select=*`);
      if(Array.isArray(raw)&&raw.length>0) return raw.map(_fix);
    }catch(e){console.warn('[Portal] id fetch failed',e);}
  }
  return [];
}

      <select class="ss" onchange="_cd=this.value;vCerts(_d)">

function sortCerts(a){
  const FAR=new Date('2099-01-01');
  return a.sort((x,y)=>{
    if(_cs==='expiry'){const vx=x.noExpiry||!x.expiryDate?FAR:new Date(x.expiryDate);const vy=y.noExpiry||!y.expiryDate?FAR:new Date(y.expiryDate);return _cd==='asc'?vx-vy:vy-vx;}
    if(_cs==='issuedate'){const vx=x.issueDate?new Date(x.issueDate):new Date(0);const vy=y.issueDate?new Date(y.issueDate):new Date(0);return _cd==='asc'?vx-vy:vy-vx;}
    if(_cs==='status'){const r=c=>!c.expiryDate||c.noExpiry?3:dd(c.expiryDate)<0?0:dd(c.expiryDate)<=30?1:dd(c.expiryDate)<=60?2:4;const vx=r(x),vy=r(y);return _cd==='asc'?vx-vy:vy-vx;}
    const map={type:'type',address:'address',certnum:'certNum'};const fld=map[_cs];
    if(!fld)return 0;const vx=(x[fld]||'').toLowerCase(),vy=(y[fld]||'').toLowerCase();
    const c=vx<vy?-1:vx>vy?1:0;return _cd==='asc'?c:-c;
  });
}

function certCard(c,d){
  const IC={Gas:'🔥',EICR:'⚡',PAT:'🔌',EPC:'🏠',Fire:'🚒',Boiler:'🔧',Legionella:'💧',Asbestos:'⚗️'};
  const ic=Object.entries(IC).find(([k])=>(c.type||'').includes(k))?.[1]||'📄';
  const df=!c.noExpiry&&c.expiryDate?dd(c.expiryDate):null;
  const isE=df!==null&&df<0,isS=df!==null&&df>=0&&df<=60;
  const pc=isE?'p-e':isS?'p-s':df===null?'p-n':'p-ok';
  const pt=isE?`Exp. ${Math.abs(df)}d ago`:isS?`${df}d left`:c.noExpiry?'No expiry':'Valid';
  const jf=d.jobs.find(j=>j.id===c.jobId);
  return`<div class="cc">
    <div class="cc-ic">${ic}</div>
    <div class="cc-body">
      <div class="cc-t">${e(c.type||'Certificate')}</div>
      <div class="cc-a">${e(c.address||(jf?.address)||'—')}</div>
      <div class="cc-m">
        <span class="pill ${pc}">${pt}</span>
        ${!c.noExpiry&&c.expiryDate?`<span style="font-size:10px;color:var(--txt3)">Exp. ${new Date(c.expiryDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}

  </div>`;
}

// ── INVOICE PDF ───────────────────────────────────────────────────────────────
function downloadInvPDF(invJson){
  let inv;
  try{inv=typeof invJson==='string'?JSON.parse(invJson):invJson;}catch(e){toast('Could not parse invoice');return;}
  if(!window.jspdf){toast('PDF library loading — please wait and try again');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297,M=18,RW=W-M*2;
  const accent=[245,166,35],dark=[22,24,35],mid=[80,85,110],light=[245,246,250];
  const t=calcTotal(inv);
  const vr=_S.vatRate||20;

  const safeText=(txt,x,y,maxW)=>{if(!txt)return;const lines=doc.splitTextToSize(String(txt),maxW||80);doc.text(lines,x,y);return lines.length;};

  // Top bar
  doc.setFillColor(...accent);doc.rect(0,0,W,4,'F');
  // Logo
  let logoBottom=M;
  if(_S.logoData){try{doc.addImage(_S.logoData,'PNG',M,M+4,36,18,'','FAST');logoBottom=M+24;}catch(e){}}
  // Company details
  let cy=logoBottom+4;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.setTextColor(...dark);
  doc.text(_S.coName||'Your Company',M,cy);cy+=5;
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...mid);
  if(_S.coAddr){safeText(_S.coAddr,M,cy,70);cy+=4*(_S.coAddr.split(',').length);}
  if(_S.coPhone){doc.text(_S.coPhone,M,cy);cy+=4;}
  if(_S.coEmail){doc.text(_S.coEmail,M,cy);cy+=4;}
  if(_S.coVatNum){doc.text('VAT No: '+_S.coVatNum,M,cy);}
  // Invoice meta right
  doc.setFont('helvetica','bold');doc.setFontSize(28);doc.setTextColor(...accent);
  doc.text('INVOICE',W-M,M+10,{align:'right'});
  doc.setFontSize(10);doc.setTextColor(...dark);
  doc.text(inv.number||'—',W-M,M+20,{align:'right'});
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...mid);
  doc.text('Issue date: '+(inv.date||'—'),W-M,M+28,{align:'right'});
  if(inv.dueDate)doc.text('Due date:  '+inv.dueDate,W-M,M+34,{align:'right'});
  doc.setFont('helvetica','bold');
  const sc={'Paid':[34,197,94],'Awaiting Payment':[245,166,35],'Cancelled':[200,60,60],'Draft':[120,130,150]}[inv.status]||mid;
  doc.setTextColor(...sc);doc.text(inv.status||'Draft',W-M,M+42,{align:'right'});
  // Divider
  let y=Math.max(cy+6,62);
  doc.setDrawColor(220,220,230);doc.setLineWidth(0.3);doc.line(M,y,W-M,y);y+=6;
  // Bill To
  const colW=(RW-10)/2;
  doc.setFillColor(...light);doc.rect(M,y,colW,6,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...mid);
  doc.text('BILL TO',M+3,y+4);y+=9;
  doc.setFont('helvetica','normal');doc.setFontSize(10);doc.setTextColor(...dark);
  doc.text(inv.billToName||inv.clientName||_d.name||'—',M,y);
  let cY=y+5;
  const bAddr=inv.billToAddress||inv.clientAddr||'';
  if(bAddr){doc.setFontSize(8.5);doc.setTextColor(...mid);const al=doc.splitTextToSize(bAddr,colW);doc.text(al,M,cY);cY+=al.length*4.5;}
  if(inv.clientEmail){doc.setFontSize(8);doc.setTextColor(...mid);doc.text(inv.clientEmail,M,cY);cY+=5;}
  y=cY+4;
  // Line items table
  doc.setDrawColor(220,220,230);doc.line(M,y,W-M,y);y+=2;
  doc.setFillColor(...dark);doc.rect(M,y,RW,6.5,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(200,200,220);
  const cols=[M+2,M+90,M+113,M+133,W-M-2];
  ['DESCRIPTION','QTY','UNIT PRICE','VAT','TOTAL'].forEach((h,i)=>doc.text(h,cols[i],y+4.5,i===4?{align:'right'}:null));
  y+=8;
  (inv.items||[]).forEach((item,ii)=>{
    const l=(item.qty||1)*(item.unit||0);const v=item.vat?l*vr/100:0;
    if(y>H-50){doc.addPage();doc.setFillColor(...accent);doc.rect(0,0,W,4,'F');y=14;}
    if(ii%2===0){doc.setFillColor(249,249,252);doc.rect(M,y-3,RW,7,'F');}
    doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...dark);
    const dl=doc.splitTextToSize(String(item.desc||''),82);
    doc.text(dl[0]+(dl.length>1?'…':''),M+2,y+1);
    doc.text(String(item.qty||1),cols[1],y+1);
    doc.text('£'+Number(item.unit||0).toFixed(2),cols[2],y+1);
    doc.setTextColor(item.vat?100:160,item.vat?120:160,160);
    doc.text(item.vat?vr+'%':'—',cols[3],y+1);
    doc.setTextColor(...dark);doc.text('£'+(l+v).toFixed(2),cols[4],y+1,{align:'right'});y+=7;
  });
  y+=3;doc.setDrawColor(220,220,230);doc.line(M,y,W-M,y);y+=6;
  // Totals
  const tC=W-M-50;
  doc.setFont('helvetica','normal');doc.setFontSize(9);doc.setTextColor(...mid);
  doc.text('Subtotal:',tC,y);doc.text('£'+t.sub.toFixed(2),W-M,y,{align:'right'});y+=5.5;
  doc.text(`VAT (${vr}%):`,tC,y);doc.text('£'+t.vat.toFixed(2),W-M,y,{align:'right'});y+=2;
  doc.setDrawColor(220,220,230);doc.line(tC,y,W-M,y);y+=5;
  doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...accent);
  doc.text('TOTAL:',tC,y);doc.text('£'+t.grand.toFixed(2),W-M,y,{align:'right'});y+=8;
  // Paid watermark
  if(inv.status==='Paid'){
    doc.saveGraphicsState();doc.setGState(doc.GState({opacity:.07}));
    doc.setFont('helvetica','bold');doc.setFontSize(80);doc.setTextColor(34,197,94);
    doc.text('PAID',W/2,H/2,{align:'center',angle:35});doc.restoreGraphicsState();
  }
  // Payment details
  if(_S.bankName||_S.bankAcc){
    y+=2;doc.setFillColor(...light);doc.rect(M,y,RW,5.5,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(7.5);doc.setTextColor(...mid);
    doc.text('PAYMENT DETAILS',M+3,y+3.8);y+=7;
    doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...dark);
    if(_S.bankName)doc.text('Bank: '+_S.bankName,M,y);
    if(_S.bankAcc)doc.text('Acc: '+_S.bankAcc+(_S.bankSort?' · Sort: '+_S.bankSort:''),M+55,y);y+=5;
    if(_S.bankIBAN)doc.text('IBAN: '+_S.bankIBAN,M,y);
  }
  // Reference box
  y+=8;
  doc.setFillColor(254,248,235);doc.setDrawColor(...accent);doc.setLineWidth(0.5);
  doc.roundedRect(M,y-3,RW,9,2,2,'FD');
  doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(100,70,10);
  doc.text('Please quote reference: '+(inv.number||'—')+' with your payment',M+3,y+2.5);y+=13;
  // Terms
  if(_S.payTerms||_S.invNotes){
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...mid);
    if(_S.payTerms){safeText(_S.payTerms,M,y,RW);y+=5;}
    if(_S.invNotes){safeText(_S.invNotes,M,y,RW);}
  }
  // Footer
  doc.setDrawColor(220,220,230);doc.line(M,H-14,W-M,H-14);
  doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(170,175,195);
  doc.text(_S.coName||'',M,H-9);
  doc.text('Generated by DeepFlow',W-M,H-9,{align:'right'});
  doc.setFillColor(...accent);doc.rect(0,H-4,W,4,'F');
  doc.save((inv.number||'invoice')+'.pdf');
  toast('📄 Invoice downloaded');
}

// ── PAYMENTS ──────────────────────────────────────────────────────────────────
function vPayments(d){
  const paid=d.invoices.filter(i=>i.status==='Paid');
  const owed=d.invoices.filter(i=>i.status!=='Paid'&&i.status!=='Cancelled');
  const owedT=owed.reduce((s,i)=>s+calcTotal(i).grand,0);
  const paidT=paid.reduce((s,i)=>s+calcTotal(i).grand,0);
  const bh=bankCard(d.entity);
  const stmtRows=[...d.invoices].sort((a,b)=>new Date(b.createdAt||b.date||0)-new Date(a.createdAt||a.date||0))
    .map(inv=>{
      const t=calcTotal(inv);const p=inv.status==='Paid',c=inv.status==='Cancelled';
      return`<div class="stmt-row">
        <div class="stmt-icon" style="background:${p?'var(--gbg)':c?'var(--s3)':'var(--rbg)'}">${p?'✅':c?'✕':'⏳'}</div>
        <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:700">${e(inv.number||'—')}</div><div style="font-size:11px;color:var(--txt3)">${inv.createdAt?fd(inv.createdAt.slice(0,10)):fd(inv.date)}</div></div>
        <div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:${p?'var(--green)':c?'var(--txt3)':'var(--red)'}">${fgbp(t.grand)}</div>
        <div style="font-size:9px;color:var(--txt3)">${p?'PAID':c?'VOID':'OUTSTANDING'}</div></div>
      </div>`;}).join('');
  document.getElementById('main').innerHTML=`
    <div class="sec"><div class="sec-hd"><div class="sec-t">💳 Payment Summary</div></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px">
        <div style="background:var(--gbg);border:1px solid var(--gbd);border-radius:var(--r2);padding:14px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--green)">${fgbp(paidT)}</div><div style="font-size:10px;color:var(--green);margin-top:3px;font-weight:600">Total Paid</div></div>
        <div style="background:${owedT>0?'var(--rbg)':'var(--gbg)'};border:1px solid ${owedT>0?'var(--rbd)':'var(--gbd)'};border-radius:var(--r2);padding:14px;text-align:center"><div style="font-size:22px;font-weight:900;color:${owedT>0?'var(--red)':'var(--green)'}">${fgbp(owedT)}</div><div style="font-size:10px;color:${owedT>0?'var(--red)':'var(--green)'};margin-top:3px;font-weight:600">${owedT>0?'Outstanding':'All Clear ✓'}</div></div>
      </div>
      ${bh||''}
    </div>
    <div class="sec"><div class="sec-hd"><div class="sec-t">📊 Statement of Account</div></div>
      ${stmtRows||empty('📊','No transactions yet','')}
    </div>`;
}

function bankCard(entity){
  if(!entity)return'';
  const bn=entity.bankName||'',ba=entity.bankAcc||'',bs=entity.bankSort||'',br=entity.bankRef||'';
  if(!bn&&!ba&&!bs&&!br)return'';
  return`<div class="bank-card">
    <div class="bank-t">🏦 Payment Details</div>
    ${bn?`<div class="bank-n">${e(bn)}</div>`:''}
    <div class="bank-row">${ba?`<div class="bank-f">Account: <strong>${e(ba)}</strong></div>`:''}${bs?`<div class="bank-f">Sort Code: <strong>${e(bs)}</strong></div>`:''}</div>
    ${br?`<div class="bank-link">🔗 ${e(br)}</div>`:''}
  </div>`;
}

// ── DOCUMENTS ─────────────────────────────────────────────────────────────────
function vDocs(d){
  const allPdfs=d.certs.filter(c=>c.url);
  const allDocs=d.attachments.filter(a=>a.url&&(a.type!=='photo'&&!/\.(jpg|jpeg|png|webp|gif)/i.test(a.url)));
  const photos=d.attachments.filter(a=>a.url&&(a.type==='photo'||/\.(jpg|jpeg|png|webp|gif)/i.test(a.url)));
  document.getElementById('main').innerHTML=`
    <div class="sec"><div class="sec-hd"><div class="sec-t">📁 All Documents <span class="sec-n">${allPdfs.length+allDocs.length+photos.length}</span></div></div>
      ${allPdfs.length?`<div style="margin-bottom:16px">
        <div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📋 Certificates</div>
        ${allPdfs.map(c=>`<div class="doc-row">
          <div class="cc-ic" style="width:36px;height:36px;border-radius:9px;font-size:16px">📄</div>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${e(c.type||'Certificate')}</div><div style="font-size:11px;color:var(--txt3)">${e(c.address||'—')}${c.certNum?' · Ref: '+e(c.certNum):''}</div></div>
          <a href="${ea(c.url)}" target="_blank" class="dl">⬇ Download</a>
        </div>`).join('')}
      </div>`:''}
      ${allDocs.length?`<div style="margin-bottom:16px">
        <div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📎 Reports &amp; Documents</div>
        ${allDocs.map(doc=>`<div class="doc-row">
          <div class="cc-ic" style="width:36px;height:36px;border-radius:9px;font-size:16px">📎</div>
          <div style="flex:1;min-width:0;overflow:hidden"><div style="font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e(doc.name||'Document')}</div><div style="font-size:11px;color:var(--txt3)">${e(doc.type||'Attachment')}</div></div>
          <a href="${ea(doc.url)}" target="_blank" class="dl">⬇ Download</a>
        </div>`).join('')}
      </div>`:''}
      ${photos.length?`<div>
        <div style="font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">📷 Job Photos</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">${photos.map(p=>`<img class="pt" style="width:90px;height:90px" src="${ea(p.url)}" onclick="openLb('${ea(p.url)}')" loading="lazy">`).join('')}</div>
      </div>`:''}
      ${!allPdfs.length&&!allDocs.length&&!photos.length?empty('📁','No documents yet','Documents and certificates will appear here once uploaded'):''}
    </div>`;
}

// ── REQUEST ───────────────────────────────────────────────────────────────────
function vRequest(d){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('main').innerHTML=`
    <div class="sec"><div class="sec-hd"><div class="sec-t">➕ New Service Request</div></div>
      <div class="rc">
        <div style="margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)">
          <div style="font-size:15px;font-weight:800;margin-bottom:4px">Submit a Request</div>
          <div style="font-size:12px;color:var(--txt2);line-height:1.5">${e(d.coName)} will be in touch within <strong>1 working day</strong> to confirm your booking.</div>
        </div>
        <div id="rw">
          <div class="fgrid fgrid-2">
            <div class="fg"><label class="fl">Property Address *</label><input class="fi" id="ra" placeholder="Full property address"></div>
            <div class="fg"><label class="fl">Service Required *</label>
              <select class="fi" id="rs">
                <option value="">Select a service...</option>
                <optgroup label="🔥 Gas"><option>Gas Safety Certificate (CP12)</option><option>Boiler Service</option><option>Boiler Repair</option></optgroup>
                <optgroup label="⚡ Electrical"><option>Electrical Inspection (EICR)</option><option>PAT Testing</option><option>Electrical Fault / Repair</option></optgroup>
                <optgroup label="🏠 Property"><option>Energy Performance Certificate (EPC)</option><option>Fire Risk Assessment</option><option>Legionella Risk Assessment</option><option>General Maintenance</option><option>Emergency Call-Out</option></optgroup>
                <option>Other (describe in notes)</option>
              </select>
            </div>
          </div>
          <div class="fgrid fgrid-2" style="margin-top:11px">
            <div class="fg"><label class="fl">Preferred Date</label><input class="fi" type="date" id="rd" min="${today}"></div>
            <div class="fg"><label class="fl">Access Arrangements</label>
              <select class="fi" id="rac"><option value="">Select...</option><option>Tenant will be home</option><option>Keys at your office</option><option>Key safe — I will provide code</option><option>I will be present</option><option>Contact tenant directly</option></select>
            </div>
          </div>
          <div class="fg" style="margin-top:11px"><label class="fl">Additional Notes</label>
            <textarea class="fi" id="rn" placeholder="Tenant contact number, access codes, parking info, special requirements..."></textarea>
          </div>
          <button class="fsub" id="rsb" onclick="submitReq()">📩 Submit Request</button>
          <div class="fnote">We'll confirm by phone or email within 1 working day · A reference number will be provided on confirmation</div>
        </div>
      </div>
    </div>`;
}

async function submitReq(){
  const addr=(document.getElementById('ra')?.value||'').trim();
  const svc=(document.getElementById('rs')?.value||'').trim();
  const date=document.getElementById('rd')?.value||'';
  const access=document.getElementById('rac')?.value||'';
  const notes=(document.getElementById('rn')?.value||'').trim();
  if(!addr){toast('Please enter the property address');return;}
  if(!svc){toast('Please select a service type');return;}
  const btn=document.getElementById('rsb');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const ref='REQ-'+Date.now().toString(36).toUpperCase().slice(-6);
    const msg=`📩 Portal Request [${ref}]\nFrom: ${_d.name} (${_d.type})\nService: ${svc}\nAddress: ${addr}`
      +(date?`\nPreferred date: ${date}`:'')+( access?`\nAccess: ${access}`:'')+(notes?`\nNotes: ${notes}`:'');
    await sb('activity',{method:'POST',body:{id:'req-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),msg,type:'request',ts:Date.now()},prefer:'return=minimal'});
    document.getElementById('rw').innerHTML=`
      <div style="text-align:center;padding:32px 14px">
        <div style="font-size:52px;margin-bottom:12px">✅</div>
        <div style="font-size:19px;font-weight:900;margin-bottom:7px">Request Submitted!</div>
        <div style="font-size:13px;color:var(--txt2);max-width:320px;margin:0 auto 6px;line-height:1.6">Your reference is <strong>${ref}</strong>.<br>${e(_d.coName)} will be in touch within 1 working day.</div>
        <button class="dl" style="margin-top:14px" onclick="go('overview')">← Back to Overview</button>
      </div>`;
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='📩 Submit Request';}
    toast('Could not send. Please call us directly.');
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function jsBadge(s){const m={'Pending':'<span class="jbadge bp">⏳ Pending</span>','In Progress':'<span class="jbadge bi">🔄 In Progress</span>','Completed':'<span class="jbadge bd">✅ Completed</span>','Invoiced':'<span class="jbadge bv">🧾 Invoiced</span>','Cancelled':'<span class="jbadge bc">✕ Cancelled</span>'};return m[s]||`<span class="jbadge bc">${e(s||'—')}</span>`;}
function empty(icon,t,sub){return`<div class="empty"><div class="ei">${icon}</div><div class="et">${t}</div><div class="es">${sub}</div></div>`;}
function showErr(t,m){document.getElementById('main').innerHTML=`<div class="empty" style="padding:80px 20px"><div class="ei">🔒</div><div class="et">${e(t)}</div><div class="es">${e(m)}</div></div>`;}
function openLb(url){document.getElementById('lb-img').src=url;document.getElementById('lb').classList.add('show');}
function closeLb(){document.getElementById('lb').classList.remove('show');document.getElementById('lb-img').src='';}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeLb();});
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.className='show';clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3500);}

init();
</script>
</body>
</html>
