<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>DeepFlow Portal</title>
<style>
:root{
  --bg:#f0f4f8;--s1:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --acc:#2563eb;--acc2:#1d4ed8;--acc-soft:#eff6ff;
  --green:#16a34a;--gbg:#f0fdf4;--gbd:#bbf7d0;
  --red:#dc2626;--rbg:#fef2f2;--rbd:#fecaca;
  --yel:#d97706;--ybg:#fffbeb;--ybd:#fde68a;
  --pur:#7c3aed;--pbg:#f5f3ff;--pbd:#ddd6fe;
  --r:16px;--r2:10px;--r3:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 20px rgba(0,0,0,.10);
  --sh3:0 8px 40px rgba(0,0,0,.16);
  --fnt:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--fnt);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* HEADER */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 16px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:var(--sh)}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;letter-spacing:-1px;flex-shrink:0}
.hdr-co{font-size:16px;font-weight:800;letter-spacing:-.3px}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;gap:5px;background:var(--acc-soft);color:var(--acc);font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid #bfdbfe;white-space:nowrap}
.hdr-client{font-size:12px;color:var(--txt3);font-weight:500}
@media(max-width:480px){.hdr-client{display:none}}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:sticky;top:58px;z-index:100}
.nav::-webkit-scrollbar{display:none}
.tab{padding:13px 16px;font-size:12.5px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.tab:hover{color:var(--txt2)}
.tab.active{color:var(--acc);border-color:var(--acc)}
@media(min-width:600px){.tab{padding:14px 20px;font-size:13px}}

/* LAYOUT */
.main{max-width:900px;margin:0 auto;padding:16px 14px}
@media(min-width:600px){.main{padding:24px 20px}}

/* HERO */
.hero{background:linear-gradient(135deg,#1e3a8a 0%,#2563eb 60%,#60a5fa 100%);border-radius:var(--r);padding:24px 22px;color:#fff;margin-bottom:18px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-30px;top:-30px;width:200px;height:200px;background:rgba(255,255,255,.06);border-radius:50%}
.hero::after{content:'';position:absolute;right:50px;bottom:-50px;width:130px;height:130px;background:rgba(255,255,255,.04);border-radius:50%}
.hero-eyebrow{display:inline-block;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 11px;font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;margin-bottom:10px}
.hero-name{font-size:22px;font-weight:900;letter-spacing:-.4px;margin-bottom:4px}
.hero-sub{font-size:13px;opacity:.8;line-height:1.5}
.hero-row{margin-top:18px;display:flex;gap:8px;flex-wrap:wrap}
.hbtn{display:inline-flex;align-items:center;gap:5px;border-radius:var(--r2);padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.16);color:#fff;transition:.15s;-webkit-tap-highlight-color:transparent;white-space:nowrap;font-family:var(--fnt)}
.hbtn:hover{background:rgba(255,255,255,.26)}
.hbtn.primary{background:#fff;color:var(--acc);border-color:transparent}
.hbtn.primary:hover{background:#f0f9ff}
@media(min-width:600px){.hero{padding:32px 36px}.hero-name{font-size:26px}}

/* STATS GRID */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
@media(min-width:540px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px}
.stat-ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-val{font-size:24px;font-weight:900;line-height:1}
.stat-lbl{font-size:11px;color:var(--txt3);margin-top:2px;font-weight:500}
.sa .stat-ic{background:var(--acc-soft)}.sa .stat-val{color:var(--acc)}
.sb .stat-ic{background:var(--gbg)}.sb .stat-val{color:var(--green)}
.sc .stat-ic{background:var(--ybg)}.sc .stat-val{color:var(--yel)}
.sd .stat-ic{background:var(--rbg)}.sd .stat-val{color:var(--red)}

/* CERT EXPIRY WIDGET */
.cew{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:18px;box-shadow:var(--sh)}
.cew-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cew-title{font-size:13px;font-weight:800}
.cew-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cew-box{border-radius:var(--r2);padding:14px 10px;text-align:center;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.cew-box:hover{opacity:.85}
.cew-n{font-size:28px;font-weight:900;line-height:1}
.cew-l{font-size:10px;font-weight:600;margin-top:4px;line-height:1.3}
.cew-exp{background:var(--rbg);border:1px solid var(--rbd)}.cew-exp .cew-n{color:var(--red)}.cew-exp .cew-l{color:var(--red)}
.cew-s30{background:var(--ybg);border:1px solid var(--ybd)}.cew-s30 .cew-n{color:var(--yel)}.cew-s30 .cew-l{color:var(--yel)}
.cew-ok{background:var(--gbg);border:1px solid var(--gbd)}.cew-ok .cew-n{color:var(--green)}.cew-ok .cew-l{color:var(--green)}

/* SECTION */
.sec{margin-bottom:24px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.sec-t{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.sec-n{font-size:10px;font-weight:700;color:var(--txt3);background:var(--s3);border-radius:10px;padding:2px 8px}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:9px;padding:11px 14px;border-radius:var(--r2);margin-bottom:8px;font-size:13px;font-weight:500;line-height:1.4}
.al-r{background:var(--rbg);border:1px solid var(--rbd);color:var(--red)}
.al-y{background:var(--ybg);border:1px solid var(--ybd);color:var(--yel)}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sl{font-size:11px;color:var(--txt3);font-weight:600;white-space:nowrap}
.ss{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:5px 10px;font-size:12px;color:var(--txt);cursor:pointer;outline:none;font-family:var(--fnt)}

/* CERT CARD */
.cc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:.2s}
.cc:hover{box-shadow:var(--sh2)}
.cc-ic{width:44px;height:44px;border-radius:12px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.cc-body{flex:1;min-width:0}
.cc-type{font-size:13px;font-weight:700;margin-bottom:2px}
.cc-addr{font-size:11px;color:var(--txt3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.p-ok{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.p-s{background:var(--ybg);color:var(--yel);border:1px solid var(--ybd)}
.p-e{background:var(--rbg);color:var(--red);border:1px solid var(--rbd)}
.p-n{background:var(--s3);color:var(--txt3);border:1px solid var(--border)}
.dl{display:inline-flex;align-items:center;gap:4px;background:var(--acc);color:#fff;border:none;border-radius:var(--r3);padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;transition:.15s;font-family:var(--fnt)}
.dl:hover{background:var(--acc2)}
.dl.g{background:var(--s2);color:var(--txt2);border:1px solid var(--border)}
.dl.sm{padding:5px 10px;font-size:11px}

/* JOB CARD */
.jc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:10px;box-shadow:var(--sh);overflow:hidden;transition:.2s}
.jc:hover{box-shadow:var(--sh2)}
.jc-hd{padding:14px 16px;display:flex;align-items:flex-start;gap:10px}
.jc-l{flex:1;min-width:0}
.jc-num{display:inline-block;font-size:10px;font-weight:700;color:var(--acc);font-family:ui-monospace,monospace;background:var(--acc-soft);padding:2px 7px;border-radius:4px;margin-bottom:6px}
.jc-addr{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3}
.jc-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.jc-strip{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--s2);border-top:1px solid var(--border);flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--txt2);font-weight:500}
.chip-dot{color:var(--border2)}
.jc-body{padding:14px 16px;border-top:1px solid var(--border)}
.jbadge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.bp{background:var(--ybg);color:var(--yel);border:1px solid var(--ybd)}
.bi{background:var(--acc-soft);color:var(--acc);border:1px solid #bfdbfe}
.bd{background:var(--gbg);color:var(--green);border:1px solid var(--gbd)}
.bv{background:var(--pbg);color:var(--pur);border:1px solid var(--pbd)}
.bc{background:var(--s3);color:var(--txt3);border:1px solid var(--border)}

/* INVOICE */
.ic{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:.2s}
.ic:hover{box-shadow:var(--sh2)}
.ic-ic{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ic-body{flex:1;min-width:0}
.ic-num{font-size:12px;font-weight:700;font-family:ui-monospace,monospace;margin-bottom:2px}
.ic-desc{font-size:11px;color:var(--txt3)}
.ic-r{text-align:right;flex-shrink:0}
.ic-amt{font-size:18px;font-weight:900}
.ic-lbl{font-size:9px;color:var(--txt3);margin-top:1px}

/* BANK CARD */
.bank-card{background:linear-gradient(135deg,#1e293b 0%,#334155 100%);border-radius:var(--r2);padding:18px;color:#fff;margin-top:16px;position:relative;overflow:hidden}
.bank-card::before{content:'';position:absolute;right:-20px;top:-20px;width:120px;height:120px;background:rgba(255,255,255,.06);border-radius:50%}
.bank-title{font-size:10px;font-weight:700;opacity:.6;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.bank-name{font-size:16px;font-weight:700;margin-bottom:6px}
.bank-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:4px}
.bank-field{font-size:12px;opacity:.75}
.bank-field strong{font-size:13px;color:#fff;opacity:1}
.bank-link{display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:var(--r3);padding:6px 12px;font-size:12px;font-weight:600;color:#fff;margin-top:8px;cursor:pointer;word-break:break-all}

/* REQUEST */
.rc{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;box-shadow:var(--sh)}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--txt2)}
.fi{background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r2);padding:11px 13px;font-size:14px;color:var(--txt);outline:none;transition:.15s;font-family:var(--fnt);width:100%}
.fi:focus{border-color:var(--acc);background:#fff}
textarea.fi{resize:vertical;min-height:80px}
select.fi{cursor:pointer}
.fgrid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:12px}
@media(min-width:520px){.fgrid-2{grid-template-columns:1fr 1fr}}
.fsub{background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:var(--fnt);margin-top:4px;transition:.15s}
.fsub:hover{background:var(--acc2)}
.fnote{font-size:11px;color:var(--txt3);text-align:center;margin-top:8px;line-height:1.5}

/* COMING SOON */
.cs{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;opacity:.6}
.cs-ic{width:38px;height:38px;background:var(--s3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cs-body{flex:1}
.cs-t{font-size:13px;font-weight:700;margin-bottom:2px}
.cs-s{font-size:11px;color:var(--txt3)}
.cs-tag{font-size:9px;font-weight:700;color:var(--txt3);background:var(--s3);border-radius:20px;padding:3px 9px;white-space:nowrap}

/* PROP GROUP (agencies) */
.pg{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.pg-hd{padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
.pg-addr{font-size:13px;font-weight:700}
.pg-meta{font-size:11px;color:var(--txt3)}
.pg-body{padding:8px 12px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--txt3)}
.ei{font-size:44px;margin-bottom:12px}
.et{font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:5px}
.es{font-size:12px;line-height:1.5}

/* PHOTO */
.pt{width:72px;height:72px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--border);transition:.2s;flex-shrink:0}
.pt:hover{transform:scale(1.06)}
@media(min-width:400px){.pt{width:82px;height:82px}}

/* FOOTER */
.footer{text-align:center;padding:24px 16px;color:var(--txt3);font-size:11px;border-top:1px solid var(--border);margin-top:8px}

/* SPINNER */
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite;margin:80px auto}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh3)}
#toast.show{opacity:1}

/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:9998;display:none;align-items:center;justify-content:center}
#lb.show{display:flex}
#lb img{max-width:94vw;max-height:90vh;border-radius:var(--r2);box-shadow:var(--sh3)}
#lb-x{position:absolute;top:16px;right:18px;color:#fff;font-size:28px;cursor:pointer;font-weight:700;line-height:1;z-index:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="logo">DF</div>
    <div class="hdr-co" id="hdr-co">DeepFlow</div>
  </div>
  <div class="hdr-r">
    <div class="hdr-client" id="hdr-name"></div>
    <div class="badge" id="portal-badge">Portal</div>
  </div>
</div>

<div class="nav" id="nav" style="display:none">
  <div class="tab active" data-t="overview"  onclick="go('overview')">📊 Overview</div>
  <div class="tab"        data-t="jobs"       onclick="go('jobs')">🔧 Jobs</div>
  <div class="tab"        data-t="certs"      onclick="go('certs')">📋 Certificates</div>
  <div class="tab"        data-t="invoices"   onclick="go('invoices')">🧾 Invoices</div>
  <div class="tab"        data-t="payments"   onclick="go('payments')">💳 Payments</div>
  <div class="tab"        data-t="docs"       onclick="go('docs')">📁 Documents</div>
  <div class="tab"        data-t="request"    onclick="go('request')">➕ Request</div>
</div>

<div class="main" id="main-content"><div class="spin"></div></div>

<div class="footer">
  <div style="font-weight:900;font-size:12px;letter-spacing:.5px">DEEPFLOW</div>
  <div style="margin-top:4px">Secure Client Portal · <span id="footer-co"></span></div>
</div>

<div id="lb" onclick="closeLb()">
  <div id="lb-x" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="">
</div>
<div id="toast"></div>

<script>
const SB_URL='https://dzqyqpuhxdrrpipbehpk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXlxcHVoeGRycnBpcGJlaHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzMjksImV4cCI6MjA4ODQ1MjMyOX0.7ObsuqKv5gNX5r7Pz1x1gyGgugcX2W0zw3d9hC6osvI';

async function sb(path,opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:opts.method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',
      'Prefer':opts.prefer||(opts.method==='POST'?'return=representation':'')},
    body:opts.body!==undefined?JSON.stringify(opts.body):undefined,
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function _fix(j){
  if(!j||typeof j!=='object')return j;
  const M={jobnum:'jobNum',certtypes:'certTypes',timeslot:'timeSlot',
    landlordname:'landlordName',agencyname:'agencyName',agentname:'agentName',
    issuedate:'issueDate',expirydate:'expiryDate',certnum:'certNum',
    noexpiry:'noExpiry',jobid:'jobId',clientname:'clientName',
    duedate:'dueDate',createdat:'createdAt',bankname:'bankName',
    bankacc:'bankAcc',banksort:'bankSort',bankref:'bankRef'};
  const r={};for(const[k,v]of Object.entries(j))r[M[k]||k]=v;return r;
}

function dd(d){return d?Math.ceil((new Date(d)-new Date())/86400000):null}
function fd(d){return d?new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}
function fgbp(n){return'£'+(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}
function calcTotal(inv){const it=typeof inv.items==='string'?JSON.parse(inv.items||'[]'):(inv.items||[]);return it.reduce((s,x)=>s+(x.qty||1)*(x.unit||0),0);}

let _d=null;
let _cs='expiry',_cd='asc';
const P=new URLSearchParams(location.search);
const token=P.get('id'), ptype=P.get('type')||'landlord';

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  if(!token){showErr('Invalid Link','This portal link is invalid or has expired.');return;}
  try{
    let entity,jobs=[],attachments=[],certs=[],invoices=[];

    if(ptype==='agency'){
      const rows=await sb(`agencies?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','This link is invalid or has expired.');return;}
      entity=_fix(rows[0]);
      document.getElementById('portal-badge').innerHTML='🏢 Agency';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?agencyname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);

    } else if(ptype==='agent'){
      // AGENT: must use a Supabase function or anon-accessible query
      // The agents table has no anon read policy — we use a special lookup via jobs table
      // by matching agentname directly. We identify the agent from the token stored in the
      // agents.id column, but need the name first. We fetch via service-key bypass using
      // the jobs table directly with agentid matching — but agents has no anon policy.
      // FIX: Store agent name in the portal URL via a separate lookup approach.
      // The portal URL is: ?id=AGENT_ID&type=agent
      // Since agents table blocks anon reads, we need another way.
      // SOLUTION: Fetch all jobs where the agentid field matches, and extract name from those.
      // OR: Use the persons table (agent as a role) if stored there.
      // ACTUAL FIX: Use anon-accessible endpoint — match via persons table if agent is stored there,
      // OR we create a public view. For now: jobs table is readable (anon policy exists on jobs),
      // so we can find the agent's name by looking up jobs with this agent's id as a special field.
      // BEST SOLUTION: Agents portal uses agentname stored in URL param &name=
      // The office generates link as ?id=AGENT_ID&type=agent&name=John+Smith
      // Here we use the name param directly to fetch jobs:
      const agentName=P.get('name');
      if(!agentName){showErr('Invalid Link','Agent portal link is missing name parameter. Please regenerate the link from the office.');return;}
      entity={name:decodeURIComponent(agentName),type:'agent',id:token};
      document.getElementById('portal-badge').innerHTML='👤 Agent';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?agentname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);

    } else {
      // LANDLORD: persons table has anon read policy
      const rows=await sb(`persons?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','This link is invalid or has expired. Contact your service provider.');return;}
      entity=_fix(rows[0]);
      document.getElementById('portal-badge').innerHTML='🏠 Landlord';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?landlordname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);
    }

    if(jobs.length){
      const idL=jobs.map(j=>`"${j.id}"`).join(',');
      const nL=(entity.name||'').toLowerCase();
      const [ra,rc,ri]=await Promise.all([
        sb(`attachments?jobid=in.(${idL})&select=*`).catch(()=>[]),
        sb(`certs?jobid=in.(${idL})&select=*`).catch(()=>[]),
        sb(`invoices?select=id,number,status,items,createdat,date,clientname,landlordname,agencyname,agentname,duedate`).catch(()=>[]),
      ]);
      attachments=(ra||[]).map(_fix);
      certs=(rc||[]).map(_fix);
      invoices=(ri||[]).map(_fix).filter(inv=>{
        const n=(inv.clientName||inv.landlordName||inv.agencyName||inv.agentName||'').toLowerCase();
        return n===nL||n.includes(nL);
      });
    }

    let coName='Your Service Provider';
    try{
      const s=await sb(`app_settings?select=value&key=eq.settings`);
      if(s?.[0]?.value){const d=typeof s[0].value==='string'?JSON.parse(s[0].value):s[0].value;if(d.coName)coName=d.coName;}
    }catch(_){}

    document.getElementById('hdr-co').textContent=coName;
    document.getElementById('hdr-name').textContent=entity.name;
    document.getElementById('footer-co').textContent=coName;

    _d={name:entity.name,type:ptype,jobs,attachments,certs,invoices,token,coName,entity};
    document.getElementById('nav').style.display='flex';
    go('overview');
  }catch(err){
    console.error(err);
    showErr('Connection Error','Could not load your portal. Please check your internet connection and try again.');
  }
}

    </div>`;

function sortCerts(a){
  const FAR=new Date('2099-01-01');
  return a.sort((x,y)=>{
    let vx,vy;
    if(_cs==='expiry'){vx=x.noExpiry||!x.expiryDate?FAR:new Date(x.expiryDate);vy=y.noExpiry||!y.expiryDate?FAR:new Date(y.expiryDate);return _cd==='asc'?vx-vy:vy-vx;}
    if(_cs==='type'){vx=(x.type||'').toLowerCase();vy=(y.type||'').toLowerCase();}
    else if(_cs==='address'){vx=(x.address||'').toLowerCase();vy=(y.address||'').toLowerCase();}
    else if(_cs==='certnum'){vx=(x.certNum||'').toLowerCase();vy=(y.certNum||'').toLowerCase();}
    else if(_cs==='issuedate'){vx=x.issueDate?new Date(x.issueDate):new Date(0);vy=y.issueDate?new Date(y.issueDate):new Date(0);return _cd==='asc'?vx-vy:vy-vx;}
    else if(_cs==='status'){const r=c=>!c.expiryDate||c.noExpiry?3:dd(c.expiryDate)<0?0:dd(c.expiryDate)<=30?1:dd(c.expiryDate)<=60?2:4;vx=r(x);vy=r(y);}
    if(vx===undefined)return 0;const c=vx<vy?-1:vx>vy?1:0;return _cd==='asc'?c:-c;
  });
}

function certCard(c,d){
  const IC={Gas:'🔥',EICR:'⚡',PAT:'🔌',EPC:'🏠',Fire:'🚒',Boiler:'🔧',Legionella:'💧',Asbestos:'⚗️'};
  const ic=Object.entries(IC).find(([k])=>(c.type||'').includes(k))?.[1]||'📄';
  const df=!c.noExpiry&&c.expiryDate?dd(c.expiryDate):null;
  const isE=df!==null&&df<0,isS=df!==null&&df>=0&&df<=60;
  const pc=isE?'p-e':isS?'p-s':df===null?'p-n':'p-ok';
  const pt=isE?`Exp. ${Math.abs(df)}d ago`:isS?`${df}d left`:c.noExpiry?'No expiry':'Valid';
  const jf=d.jobs.find(j=>j.id===c.jobId);
  return`<div class="cc">
    <div class="cc-ic">${ic}</div>
    <div class="cc-body">
      <div class="cc-type">${e(c.type||'Certificate')}</div>
      <div class="cc-addr">${e(c.address||(jf?.address)||'—')}</div>
      <div class="cc-meta">
        <span class="pill ${pc}">${pt}</span>
        ${!c.noExpiry&&c.expiryDate?`<span style="font-size:10px;color:var(--txt3)">Exp. ${new Date(c.expiryDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</span>`:''}
        ${c.certNum?`<span style="font-size:10px;color:var(--txt3)">Ref: ${e(c.certNum)}</span>`:''}

    ${c.url?`<a href="${ea(c.url)}" target="_blank" class="dl">⬇ Download</a>`:`<span class="dl g" style="cursor:default;opacity:.5">No PDF</span>`}
  </div>`;
}

function bankCard(entity){
  if(!entity)return'';
  const bn=entity.bankName||entity.bank_name||'';
  const ba=entity.bankAcc||entity.bank_acc||'';
  const bs=entity.bankSort||entity.bank_sort||'';
  const br=entity.bankRef||entity.bank_ref||'';
  if(!bn&&!ba&&!bs&&!br)return'';
  return`<div class="bank-card">
    <div class="bank-title">🏦 Payment Details</div>
    ${bn?`<div class="bank-name">${e(bn)}</div>`:''}
    <div class="bank-row">
      ${ba?`<div class="bank-field">Account: <strong>${e(ba)}</strong></div>`:''}
      ${bs?`<div class="bank-field">Sort Code: <strong>${e(bs)}</strong></div>`:''}
    </div>
    ${br?`<div class="bank-link">🔗 ${e(br)}</div>`:''}
  </div>`;
}

// ── DOCUMENTS ────────────────────────────────────────────────
function vDocs(d){
  const allDocs=d.attachments.filter(a=>a.url&&(a.type!=='photo'&&!/\.(jpg|jpeg|png|webp|gif)/i.test(a.url)));
  const allPdfs=d.certs.filter(c=>c.url);
  document.getElementById('main-content').innerHTML=`
    <div class="sec">
      <div class="sec-hd"><div class="sec-t">📁 Certificates &amp; Documents <span class="sec-n">${allPdfs.length+allDocs.length}</span></div></div>
      ${allPdfs.length?`<div style="margin-bottom:16px">
        <div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📋 Certificates</div>
        ${allPdfs.map(c=>`<div class="cc" style="margin-bottom:8px">
          <div class="cc-ic">📄</div>
          <div class="cc-body">
            <div class="cc-type">${e(c.type||'Certificate')}</div>
            <div class="cc-addr">${e(c.address||'—')}</div>
            ${c.certNum?`<div style="font-size:10px;color:var(--txt3);margin-top:3px">Ref: ${e(c.certNum)}</div>`:''}
          </div>
          <a href="${ea(c.url)}" target="_blank" class="dl">⬇ Download</a>
        </div>`).join('')}
      </div>`:''}
      ${allDocs.length?`<div>
        <div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">📎 Documents &amp; Reports</div>
        ${allDocs.map(doc=>`<div class="cc" style="margin-bottom:8px">
          <div class="cc-ic">📎</div>
          <div class="cc-body">
            <div class="cc-type">${e(doc.name||'Document')}</div>
            <div class="cc-addr">${e(doc.type||'Attachment')}</div>
          </div>
          <a href="${ea(doc.url)}" target="_blank" class="dl">⬇ Download</a>
        </div>`).join('')}
      </div>`:''}
      ${!allPdfs.length&&!allDocs.length?emptyHtml('📁','No documents yet','Documents and certificates will appear here once uploaded'):''}
    </div>
    <div class="sec">
      <div class="sec-hd"><div class="sec-t">📥 Coming Soon</div></div>
      ${cs('📦','Document Archive','All compliance documents searchable by date and type')}
      ${cs('🔄','Bulk Download','Download all documents as a single ZIP')}
    </div>`;
}

// ── REQUEST ──────────────────────────────────────────────────
function vRequest(d){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('main-content').innerHTML=`
    <div class="sec">
      <div class="sec-hd"><div class="sec-t">➕ New Service Request</div></div>
      <div class="rc">
        <div style="margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)">
          <div style="font-size:16px;font-weight:800;margin-bottom:5px">Submit a Request</div>
          <div style="font-size:13px;color:var(--txt2);line-height:1.5">${e(d.coName)} will be in touch within <strong>1 working day</strong> to confirm your booking.</div>
        </div>
        <div id="rw">
          <div class="fgrid fgrid-2">
            <div class="fg"><label class="fl">Property Address *</label><input class="fi" id="ra" placeholder="Full property address"></div>
            <div class="fg"><label class="fl">Service Required *</label>
              <select class="fi" id="rs">
                <option value="">Select a service...</option>
                <optgroup label="Gas">
                  <option>Gas Safety Certificate (CP12)</option>
                  <option>Boiler Service</option>
                  <option>Boiler Repair</option>
                </optgroup>
                <optgroup label="Electrical">
                  <option>Electrical Inspection (EICR)</option>
                  <option>PAT Testing</option>
                  <option>Electrical Fault / Repair</option>
                </optgroup>
                <optgroup label="Property">
                  <option>Energy Performance Certificate (EPC)</option>
                  <option>Fire Risk Assessment</option>
                  <option>Legionella Risk Assessment</option>
                  <option>General Maintenance</option>
                  <option>Emergency Call-Out</option>
                </optgroup>
                <option>Other (describe in notes)</option>
              </select>
            </div>
          </div>
          <div class="fgrid fgrid-2" style="margin-top:12px">
            <div class="fg"><label class="fl">Preferred Date</label><input class="fi" type="date" id="rd" min="${today}"></div>
            <div class="fg"><label class="fl">Access Arrangements</label>
              <select class="fi" id="rac">
                <option value="">Select...</option>
                <option>Tenant will be home</option>
                <option>Keys at your office</option>
                <option>Key safe — I will provide code</option>
                <option>I will be present</option>
                <option>Contact tenant directly to arrange</option>
              </select>
            </div>
          </div>
          <div class="fg" style="margin-top:12px"><label class="fl">Additional Notes</label>
            <textarea class="fi" id="rn" placeholder="Special requirements, tenant contact number, access codes, parking info..."></textarea>
          </div>
          <button class="fsub" id="rsb" onclick="submitReq()">📩 Submit Request</button>
          <div class="fnote">We'll confirm by phone or email within 1 working day · Your reference will be sent on confirmation</div>
        </div>
      </div>
    </div>`;
}

async function submitReq(){
  const addr=(document.getElementById('ra')?.value||'').trim();
  const svc=(document.getElementById('rs')?.value||'').trim();
  const date=document.getElementById('rd')?.value||'';
  const access=document.getElementById('rac')?.value||'';
  const notes=(document.getElementById('rn')?.value||'').trim();
  if(!addr){toast('Please enter the property address');return;}
  if(!svc){toast('Please select a service type');return;}
  const btn=document.getElementById('rsb');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const ref='REQ-'+Date.now().toString(36).toUpperCase().slice(-6);
    const msg=`📩 Portal Request [${ref}]\nFrom: ${_d.name} (${_d.type})\nService: ${svc}\nAddress: ${addr}`
      +(date?`\nPreferred date: ${date}`:'')+( access?`\nAccess: ${access}`:'')+(notes?`\nNotes: ${notes}`:'');
    await sb('activity',{method:'POST',body:{id:'req-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),msg,type:'request',ts:Date.now()},prefer:'return=minimal'});
    document.getElementById('rw').innerHTML=`
      <div style="text-align:center;padding:32px 16px">
        <div style="font-size:56px;margin-bottom:14px">✅</div>
        <div style="font-size:20px;font-weight:900;margin-bottom:8px">Request Submitted!</div>
        <div style="font-size:13px;color:var(--txt2);max-width:340px;margin:0 auto 8px;line-height:1.6">
          Your reference is <strong>${ref}</strong>.<br>
          ${e(_d.coName)} will be in touch within 1 working day to confirm your booking.
        </div>
        <button class="dl" style="margin-top:16px" onclick="go('overview')">← Back to Overview</button>
      </div>`;
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='📩 Submit Request';}
    toast('Could not send. Please call us directly.');
  }
}

// ── HELPERS ──────────────────────────────────────────────────
function jsBadge(s){
  const m={'Pending':'<span class="jbadge bp">⏳ Pending</span>',
    'In Progress':'<span class="jbadge bi">🔄 In Progress</span>',
    'Completed':'<span class="jbadge bd">✅ Completed</span>',
    'Invoiced':'<span class="jbadge bv">🧾 Invoiced</span>',
    'Cancelled':'<span class="jbadge bc">✕ Cancelled</span>'};
  return m[s]||`<span class="jbadge bc">${e(s||'—')}</span>`;
}
function cs(icon,t,sub){return`<div class="cs"><div class="cs-ic">${icon}</div><div class="cs-body"><div class="cs-t">${t}</div><div class="cs-s">${sub}</div></div><div class="cs-tag">v2</div></div>`;}
function emptyHtml(icon,t,sub){return`<div class="empty"><div class="ei">${icon}</div><div class="et">${t}</div><div class="es">${sub}</div></div>`;}
function showErr(t,m){document.getElementById('main-content').innerHTML=`<div class="empty" style="padding:80px 20px"><div class="ei">🔒</div><div class="et">${e(t)}</div><div class="es">${e(m)}</div></div>`;}
function openLb(url){document.getElementById('lb-img').src=url;document.getElementById('lb').classList.add('show');}
function closeLb(){document.getElementById('lb').classList.remove('show');document.getElementById('lb-img').src='';}
document.addEventListener('keydown',ev=>{if(ev.key==='Escape')closeLb();});
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.className='show';clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3500);}

init();
</script>
</body>
</html>
