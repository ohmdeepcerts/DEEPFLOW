<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepFlow Client Portal</title>
<style>
  :root {
    --bg: #f8fafc;
    --s1: #ffffff;
    --s2: #f1f5f9;
    --s3: #e2e8f0;
    --border: #e2e8f0;
    --border2: #cbd5e1;
    --txt: #0f172a;
    --txt2: #475569;
    --txt3: #94a3b8;
    --acc: #2563eb;
    --acc2: #1d4ed8;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --yellow: #d97706;
    --yellow-bg: #fffbeb;
    --blue-bg: #eff6ff;
    --r: 12px;
    --r2: 8px;
    --sh: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
    --sh2: 0 4px 16px rgba(0,0,0,.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--txt); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Header */
  .header {
    background: var(--s1);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0;
    z-index: 10;
    box-shadow: var(--sh);
  }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 24px; font-weight: 900; color: var(--acc); letter-spacing: -1px; }
  .logo-text { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .header-badge {
    background: var(--blue-bg);
    color: var(--acc);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #bfdbfe;
  }

  /* Main */
  .main { max-width: 900px; margin: 0 auto; padding: 28px 20px; }

  /* Welcome */
  .welcome-card {
    background: linear-gradient(135deg, var(--acc) 0%, #1d4ed8 100%);
    border-radius: var(--r);
    padding: 28px;
    color: #fff;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .welcome-card::after {
    content: '⚡';
    position: absolute;
    right: 24px; top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    opacity: .15;
  }
  .welcome-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .welcome-sub { font-size: 14px; opacity: .85; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 18px;
    box-shadow: var(--sh);
    text-align: center;
  }
  .stat-val { font-size: 28px; font-weight: 800; }
  .stat-label { font-size: 12px; color: var(--txt2); margin-top: 4px; font-weight: 500; }
  .stat-green { color: var(--green); }
  .stat-yellow { color: var(--yellow); }
  .stat-red { color: var(--red); }
  .stat-blue { color: var(--acc); }

  /* Section title */
  .section-title {
    font-size: 16px;
    font-weight: 800;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Job cards */
  .job-card {
    background: var(--s1);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 20px;
    margin-bottom: 12px;
    box-shadow: var(--sh);
    transition: box-shadow .2s;
  }
  .job-card:hover { box-shadow: var(--sh2); }
  .job-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .job-num { font-size: 12px; font-weight: 700; color: var(--acc); font-family: monospace; background: var(--blue-bg); padding: 3px 8px; border-radius: 4px; }
  .job-addr { font-size: 17px; font-weight: 700; margin-bottom: 6px; }

  /* Status badges */
  .status-badge { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; }
  .s-pending { background: var(--yellow-bg); color: var(--yellow); border: 1px solid #fde68a; }
  .s-progress { background: var(--blue-bg); color: var(--acc); border: 1px solid #bfdbfe; }
  .s-completed { background: var(--green-bg); color: var(--green); border: 1px solid #bbf7d0; }
  .s-invoiced { background: #f5f3ff; color: #7c3aed; border: 1px solid #ddd6fe; }

  /* Job details */
  .job-details { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .job-detail { }
  .job-detail-label { font-size: 11px; font-weight: 600; color: var(--txt3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
  .job-detail-val { font-size: 14px; color: var(--txt); font-weight: 500; }

  /* Certs section */
  .certs-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
  .cert-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--s2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    flex: 1;
    min-width: 200px;
  }
  .cert-icon { font-size: 22px; }
  .cert-info { flex: 1; }
  .cert-name { font-size: 13px; font-weight: 700; }
  .cert-expiry { font-size: 11px; color: var(--txt2); margin-top: 2px; }
  .cert-expiry.expiring-soon { color: var(--red); font-weight: 600; }
  .cert-download {
    background: var(--acc);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    white-space: nowrap;
  }

  /* Photos */
  .photos-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .photo-thumb {
    width: 80px; height: 80px;
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid var(--border);
    transition: transform .2s;
  }
  .photo-thumb:hover { transform: scale(1.05); }

  /* Expiry warning */
  .expiry-warning {
    background: var(--red-bg);
    border: 1px solid #fecaca;
    border-radius: var(--r2);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    font-size: 13px;
    color: var(--red);
    font-weight: 600;
  }

  /* Request job */
  .request-card {
    background: var(--s1);
    border: 2px dashed var(--border2);
    border-radius: var(--r);
    padding: 28px;
    text-align: center;
    margin-top: 20px;
  }
  .request-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .request-sub { font-size: 14px; color: var(--txt2); margin-bottom: 18px; }
  .request-btn {
    background: var(--acc);
    color: #fff;
    border: none;
    border-radius: var(--r2);
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  .request-btn:hover { background: var(--acc2); }

  /* Request form */
  .request-form { display: none; margin-top: 20px; text-align: left; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 600; color: var(--txt2); margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%;
    background: var(--s2);
    border: 1px solid var(--border2);
    border-radius: var(--r2);
    padding: 12px 14px;
    font-size: 14px;
    color: var(--txt);
    outline: none;
  }
  .form-input:focus { border-color: var(--acc); }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .form-submit {
    background: var(--green);
    color: #fff;
    border: none;
    border-radius: var(--r2);
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }

  /* Loading */
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--acc); border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error / not found */
  .error-page { text-align: center; padding: 80px 20px; }
  .error-icon { font-size: 64px; margin-bottom: 16px; }
  .error-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
  .error-sub { color: var(--txt2); font-size: 15px; }

  /* Footer */
  .footer { text-align: center; padding: 28px; color: var(--txt3); font-size: 12px; margin-top: 40px; border-top: 1px solid var(--border); }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    .job-details { grid-template-columns: 1fr 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">
    <div class="logo-icon">DF</div>
    <div class="logo-text">DeepFlow</div>
  </div>
  <div class="header-badge" id="portal-type-badge">Client Portal</div>
</div>

<div class="main" id="main-content">
  <div style="text-align:center;padding:80px 0"><div class="spinner"></div></div>
</div>

<div class="footer">
  Powered by DeepFlow · Secure Client Portal · <span id="footer-company"></span>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://dzqyqpuhxdrrpipbehpk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXlxcHVoeGRycnBpcGJlaHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzMjksImV4cCI6MjA4ODQ1MjMyOX0.7ObsuqKv5gNX5r7Pz1x1gyGgugcX2W0zw3d9hC6osvI';

async function sb(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function sbPost(path, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify(body)
  });
  return res.json();
}

// Parse URL params
const params = new URLSearchParams(location.search);
const token = params.get('id');
const type = params.get('type') || 'landlord'; // 'landlord' or 'agency'

async function init() {
  if (!token) { showError('No portal link', 'This link is invalid or has expired. Please contact your service provider.'); return; }

  try {
    if (type === 'agency') {
      await loadAgencyPortal(token);
    } else {
      await loadLandlordPortal(token);
    }
  } catch(e) {
    showError('Could not load portal', 'Please check your internet connection and try again.');
  }
}

// ── LANDLORD PORTAL ─────────────────────────────────────────
async function loadLandlordPortal(token) {
  // Find person by portal token (stored in persons table)
  const persons = await sb(`persons?id=eq.${token}&select=*`);
  if (!persons || !persons.length) {
    showError('Portal not found', 'This link is invalid or has expired.');
    return;
  }
  const person = persons[0];
  document.getElementById('portal-type-badge').textContent = '🏠 Landlord Portal';
  document.title = `${person.name} — DeepFlow Portal`;

  // Load all jobs for this landlord
  const jobs = await sb(`jobs?person_id=eq.${token}&order=date.desc&select=*`);
  const jobIds = (jobs || []).map(j => `"${j.id}"`).join(',');
  const attachments = jobIds.length ? await sb(`attachments?job_id=in.(${jobIds})&select=*`) : [];
  const certs = jobs?.length ? await sb(`certs?job_id=in.(${jobIds})&select=*`) : [];

  renderPortal({
    name: person.name,
    type: 'landlord',
    jobs: jobs || [],
    attachments: attachments || [],
    certs: certs || [],
    token
  });
}

// ── AGENCY PORTAL ────────────────────────────────────────────
async function loadAgencyPortal(token) {
  const agencies = await sb(`agencies?portal_token=eq.${token}&select=*`);
  if (!agencies || !agencies.length) {
    showError('Portal not found', 'This link is invalid or has expired.');
    return;
  }
  const agency = agencies[0];
  document.getElementById('portal-type-badge').textContent = '🏢 Agency Portal';
  document.title = `${agency.name} — DeepFlow Portal`;

  const jobs = await sb(`jobs?agency_id=eq.${agency.id}&order=date.desc&select=*`);
  const jobIds = (jobs || []).map(j => `"${j.id}"`).join(',');
  const attachments = jobIds.length ? await sb(`attachments?job_id=in.(${jobIds})&select=*`) : [];
  const certs = jobs?.length ? await sb(`certs?job_id=in.(${jobIds})&select=*`) : [];

  renderPortal({
    name: agency.name,
    type: 'agency',
    jobs: jobs || [],
    attachments: attachments || [],
    certs: certs || [],
    token
  });
}

// ── RENDER ───────────────────────────────────────────────────
function renderPortal({ name, type, jobs, attachments, certs, token }) {
  const today = new Date();
  const completed = jobs.filter(j => j.status === 'Completed').length;
  const pending = jobs.filter(j => j.status === 'Pending' || j.status === 'In Progress').length;
  const expiringSoon = certs.filter(c => {
    if (!c.expiry_date) return false;
    const d = new Date(c.expiry_date);
    const diff = (d - today) / 86400000;
    return diff > 0 && diff <= 60;
  }).length;
  const expired = certs.filter(c => c.expiry_date && new Date(c.expiry_date) < today).length;

  // Settings
  const settings = JSON.parse(localStorage.getItem('df_settings') || '{}');
  const companyName = settings.coName || 'Your Service Provider';
  document.getElementById('footer-company').textContent = companyName;

  let html = `
    <div class="welcome-card">
      <div class="welcome-title">Welcome, ${name}</div>
      <div class="welcome-sub">Here's an overview of all your properties and certificates</div>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="stat-val stat-blue">${jobs.length}</div><div class="stat-label">Total Jobs</div></div>
      <div class="stat-card"><div class="stat-val stat-green">${completed}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card"><div class="stat-val stat-yellow">${pending}</div><div class="stat-label">Pending</div></div>
      <div class="stat-card"><div class="stat-val stat-red">${expiringSoon + expired}</div><div class="stat-label">Cert Alerts</div></div>
    </div>`;

  // Expiry warnings
  const expWarnings = certs.filter(c => {
    if (!c.expiry_date) return false;
    return new Date(c.expiry_date) <= new Date(Date.now() + 60*86400000);
  });
  if (expWarnings.length) {
    html += `<div style="margin-bottom:20px">`;
    expWarnings.forEach(c => {
      const d = new Date(c.expiry_date);
      const diff = Math.ceil((d - today) / 86400000);
      const msg = diff < 0 ? `⚠️ EXPIRED on ${d.toLocaleDateString('en-GB')}` : `⏰ Expires in ${diff} days (${d.toLocaleDateString('en-GB')})`;
      html += `<div class="expiry-warning">🔴 ${c.type} at ${c.address} — ${msg}</div>`;
    });
    html += `</div>`;
  }

  // Jobs
  if (!jobs.length) {
    html += `<div style="text-align:center;padding:40px;color:var(--txt3);background:var(--s1);border-radius:var(--r);border:1px solid var(--border)"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-weight:700;font-size:16px">No jobs yet</div></div>`;
  } else {
    // Group by address if agency
    html += `<div class="section-title">📋 All Jobs</div>`;
    jobs.forEach(j => {
      const jobAttachments = attachments.filter(a => a.job_id === j.id);
      const jobCerts = certs.filter(c => c.job_id === j.id);
      const photos = jobAttachments.filter(a => a.type === 'photo');
      const docs = jobAttachments.filter(a => a.type !== 'photo');

      const statusBadge = getStatusBadge(j.status);
      const certRows = [...jobCerts, ...docs.filter(d => d.mime === 'application/pdf')];

      html += `
        <div class="job-card">
          <div class="job-card-header">
            <div>
              <div class="job-num">${j.job_num || '—'}</div>
              <div class="job-addr" style="margin-top:6px">${j.address}</div>
            </div>
            ${statusBadge}
          </div>

          ${j.description ? `<div style="font-size:14px;color:var(--txt2)">${j.description}</div>` : ''}

          <div class="job-details">
            ${j.date ? `<div class="job-detail"><div class="job-detail-label">Date</div><div class="job-detail-val">${new Date(j.date+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div></div>` : ''}
            ${j.engineer ? `<div class="job-detail"><div class="job-detail-label">Engineer</div><div class="job-detail-val">👷 ${j.engineer}</div></div>` : ''}
            ${(j.cert_types||[]).length ? `<div class="job-detail"><div class="job-detail-label">Cert Types</div><div class="job-detail-val">${j.cert_types.join(', ')}</div></div>` : ''}
          </div>

          ${certRows.length ? `
          <div class="certs-row">
            ${certRows.map(c => {
              const isJobCert = c.issue_date !== undefined; // it's a cert record
              const name = isJobCert ? c.type : c.name;
              const expiry = isJobCert && c.expiry_date ? new Date(c.expiry_date) : null;
              const isExpiringSoon = expiry && (expiry - today) / 86400000 <= 60;
              const isExpired = expiry && expiry < today;
              const expiryText = expiry ? `Expires: ${expiry.toLocaleDateString('en-GB')}` : '';
              const downloadUrl = isJobCert ? null : c.url;
              return `
                <div class="cert-item">
                  <div class="cert-icon">📄</div>
                  <div class="cert-info">
                    <div class="cert-name">${name}</div>
                    ${expiryText ? `<div class="cert-expiry ${isExpiringSoon || isExpired ? 'expiring-soon' : ''}">${isExpired ? '⚠️ ' : isExpiringSoon ? '⏰ ' : ''}${expiryText}</div>` : ''}
                  </div>
                  ${downloadUrl ? `<a href="${downloadUrl}" target="_blank" class="cert-download">⬇ Download</a>` : ''}
                </div>`;
            }).join('')}
          </div>` : ''}

          ${photos.length ? `
          <div class="photos-row">
            ${photos.map(p => `<img src="${p.url}" class="photo-thumb" onclick="window.open('${p.url}')" title="Click to view full size">`).join('')}
          </div>` : ''}
        </div>`;
    });
  }

  // Request new job
  html += `
    <div class="request-card" id="request-section">
      <div class="request-title">📩 Request a New Job</div>
      <div class="request-sub">Need a new inspection or service? Submit a request and we'll be in touch.</div>
      <button class="request-btn" onclick="showRequestForm()">Request a Job</button>
      <div class="request-form" id="request-form">
        <div class="form-group">
          <label class="form-label">Property Address</label>
          <input class="form-input" id="req-address" placeholder="Full address">
        </div>
        <div class="form-group">
          <label class="form-label">Service Required</label>
          <input class="form-input" id="req-service" placeholder="e.g. Gas Safety, EICR, PAT Testing">
        </div>
        <div class="form-group">
          <label class="form-label">Preferred Date</label>
          <input class="form-input" type="date" id="req-date">
        </div>
        <div class="form-group">
          <label class="form-label">Additional Notes</label>
          <textarea class="form-input" id="req-notes" placeholder="Any special requirements or access info..."></textarea>
        </div>
        <button class="form-submit" onclick="submitRequest('${name}', '${type}', '${token}')">✅ Submit Request</button>
      </div>
    </div>`;

  document.getElementById('main-content').innerHTML = html;
}

function getStatusBadge(status) {
  const map = {
    'Pending': `<span class="status-badge s-pending">⏳ Pending</span>`,
    'In Progress': `<span class="status-badge s-progress">🔄 In Progress</span>`,
    'Completed': `<span class="status-badge s-completed">✅ Completed</span>`,
    'Invoiced': `<span class="status-badge s-invoiced">🧾 Invoiced</span>`,
  };
  return map[status] || `<span class="status-badge s-pending">${status}</span>`;
}

function showRequestForm() {
  document.getElementById('request-form').style.display = 'block';
  document.querySelector('.request-btn').style.display = 'none';
}

async function submitRequest(clientName, clientType, token) {
  const address = document.getElementById('req-address').value.trim();
  const service = document.getElementById('req-service').value.trim();
  const date = document.getElementById('req-date').value;
  const notes = document.getElementById('req-notes').value.trim();
  if (!address || !service) { toast('Please fill in address and service'); return; }

  try {
    await sbPost('activity', {
      msg: `📩 Portal job request from ${clientName}: ${service} at ${address}${date ? ' on '+date : ''}${notes ? ' — '+notes : ''}`,
      type: 'request'
    });
    document.getElementById('request-form').innerHTML = `
      <div style="text-align:center;padding:20px;color:var(--green)">
        <div style="font-size:40px;margin-bottom:12px">✅</div>
        <div style="font-size:18px;font-weight:700">Request Submitted!</div>
        <div style="color:var(--txt2);margin-top:8px">We'll be in touch shortly to confirm the booking.</div>
      </div>`;
  } catch(e) {
    toast('⚠️ Failed to submit. Please call us directly.');
  }
}

function showError(title, msg) {
  document.getElementById('main-content').innerHTML = `
    <div class="error-page">
      <div class="error-icon">🔒</div>
      <div class="error-title">${title}</div>
      <div class="error-sub">${msg}</div>
    </div>`;
}

let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show';
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.className = '', 3000);
}

init();
</script>
</body>
</html>
