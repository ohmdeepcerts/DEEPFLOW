<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DeepFlow Client Portal</title>
<style>
:root{
  --bg:#f0f4f8;--s1:#fff;--s2:#f8fafc;--s3:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;
  --acc:#2563eb;--acc2:#1d4ed8;--acc-soft:#eff6ff;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --yel:#d97706;--yel-bg:#fffbeb;--yel-bd:#fde68a;
  --pur:#7c3aed;--pur-bg:#f5f3ff;--pur-bd:#ddd6fe;
  --r:14px;--r2:10px;--r3:6px;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --sh2:0 4px 20px rgba(0,0,0,.10);
  --sh3:0 8px 32px rgba(0,0,0,.14);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}

/* HDR */
.hdr{background:var(--s1);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--sh)}
.hdr-brand{display:flex;align-items:center;gap:9px}
.hdr-logo{width:32px;height:32px;background:var(--acc);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:900;letter-spacing:-1px;flex-shrink:0}
.hdr-name{font-size:16px;font-weight:800;letter-spacing:-.4px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-badge{background:var(--acc-soft);color:var(--acc);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;border:1px solid #bfdbfe;white-space:nowrap}
.hdr-client{font-size:12px;color:var(--txt3);font-weight:500;display:none}
@media(min-width:500px){.hdr-client{display:block}}

/* NAV */
.nav{background:var(--s1);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-tab{padding:12px 14px;font-size:12px;font-weight:600;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;flex-shrink:0;user-select:none;-webkit-tap-highlight-color:transparent}
.nav-tab:hover{color:var(--txt2)}
.nav-tab.active{color:var(--acc);border-bottom-color:var(--acc)}
@media(min-width:600px){.nav-tab{padding:14px 18px;font-size:13px}}

/* MAIN */
.main{max-width:960px;margin:0 auto;padding:16px}
@media(min-width:600px){.main{padding:24px 20px}}
@media(min-width:960px){.main{padding:28px 20px}}

/* HERO */
.hero{background:linear-gradient(135deg,#1e40af 0%,#2563eb 55%,#3b82f6 100%);border-radius:var(--r);padding:22px 20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-20px;top:-20px;width:160px;height:160px;background:rgba(255,255,255,.07);border-radius:50%}
.hero-badge{display:inline-block;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-bottom:10px}
.hero-title{font-size:20px;font-weight:900;margin-bottom:4px;letter-spacing:-.3px}
.hero-sub{font-size:13px;opacity:.8}
.hero-btns{margin-top:16px;display:flex;gap:8px;flex-wrap:wrap}
.hbtn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:var(--r2);padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;white-space:nowrap}
.hbtn:hover,.hbtn:active{background:rgba(255,255,255,.28)}
.hbtn.primary{background:#fff;color:var(--acc)}
.hbtn.primary:hover{background:#f0f9ff}
@media(min-width:600px){.hero{padding:28px 32px}.hero-title{font-size:24px}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:600px){.stats{grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);display:flex;align-items:center;gap:10px}
.stat-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:900;line-height:1}
.stat-lbl{font-size:10px;color:var(--txt3);margin-top:2px;font-weight:500}
.st-blue .stat-icon{background:var(--acc-soft)}.st-blue .stat-val{color:var(--acc)}
.st-green .stat-icon{background:var(--green-bg)}.st-green .stat-val{color:var(--green)}
.st-yel .stat-icon{background:var(--yel-bg)}.st-yel .stat-val{color:var(--yel)}
.st-red .stat-icon{background:var(--red-bg)}.st-red .stat-val{color:var(--red)}

/* CERT EXPIRY DASHBOARD WIDGET */
.cert-expiry-widget{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-bottom:16px;box-shadow:var(--sh)}
.cew-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cew-title{font-size:13px;font-weight:800;display:flex;align-items:center;gap:6px}
.cew-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.cew-bar{border-radius:var(--r2);padding:12px;text-align:center;cursor:pointer;transition:opacity .15s;-webkit-tap-highlight-color:transparent}
.cew-bar:hover{opacity:.85}
.cew-bar:active{opacity:.7}
.cew-num{font-size:26px;font-weight:900;line-height:1}
.cew-lbl{font-size:10px;font-weight:600;margin-top:4px}

/* SECTION */
.sec{margin-bottom:20px}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px}
.sec-count{font-size:11px;font-weight:700;color:var(--txt3);background:var(--s3);border-radius:10px;padding:2px 8px}
.sec-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* SORT BAR */
.sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sort-lbl{font-size:11px;color:var(--txt3);font-weight:600;white-space:nowrap}
.sort-sel{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:5px 10px;font-size:12px;color:var(--txt);cursor:pointer;outline:none;font-family:inherit}
.sort-dir{background:var(--s2);border:1px solid var(--border2);border-radius:var(--r3);padding:5px 10px;font-size:12px;color:var(--txt);cursor:pointer;outline:none;font-family:inherit}

/* ALERT */
.alert{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:var(--r2);margin-bottom:8px;font-size:13px;font-weight:500}
.al-red{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.al-yel{background:var(--yel-bg);border:1px solid var(--yel-bd);color:var(--yel)}

/* CERT CARD */
.cert-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:box-shadow .2s}
.cert-card:hover{box-shadow:var(--sh2)}
.cert-icon-wrap{width:42px;height:42px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cert-body{flex:1;min-width:0}
.cert-type{font-size:13px;font-weight:700;margin-bottom:2px}
.cert-addr{font-size:11px;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cert-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px}
.p-valid{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.p-soon{background:var(--yel-bg);color:var(--yel);border:1px solid var(--yel-bd)}
.p-exp{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.cert-dl{display:inline-flex;align-items:center;gap:4px;background:var(--acc);color:#fff;border:none;border-radius:var(--r3);padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.cert-dl:hover{background:var(--acc2)}
.cert-dl.ghost{background:var(--s2);color:var(--txt3);border:1px solid var(--border)}

/* JOB CARD */
.job-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;box-shadow:var(--sh);overflow:hidden}
.job-card-hd{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.job-left{min-width:0;flex:1}
.job-num{display:inline-block;font-size:10px;font-weight:700;color:var(--acc);font-family:ui-monospace,monospace;background:var(--acc-soft);padding:2px 7px;border-radius:4px;margin-bottom:6px}
.job-addr{font-size:15px;font-weight:700;margin-bottom:3px;line-height:1.3}
.job-desc{font-size:12px;color:var(--txt2);line-height:1.5}
.job-strip{display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--s2);border-top:1px solid var(--border);flex-wrap:wrap}
.jchip{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--txt2);font-weight:500}
.jchip-sep{color:var(--border2)}
.job-body{padding:14px 16px;border-top:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.b-pend{background:var(--yel-bg);color:var(--yel);border:1px solid var(--yel-bd)}
.b-prog{background:var(--acc-soft);color:var(--acc);border:1px solid #bfdbfe}
.b-done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.b-inv{background:var(--pur-bg);color:var(--pur);border:1px solid var(--pur-bd)}
.b-can{background:var(--s3);color:var(--txt3);border:1px solid var(--border)}

/* INVOICE */
.inv-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:box-shadow .2s}
.inv-card:hover{box-shadow:var(--sh2)}
.inv-icon{width:40px;height:40px;background:var(--pur-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.inv-body{flex:1;min-width:0}
.inv-num{font-size:12px;font-weight:700;font-family:ui-monospace,monospace;margin-bottom:2px}
.inv-desc{font-size:11px;color:var(--txt3)}
.inv-right{text-align:right;white-space:nowrap;flex-shrink:0}
.inv-amt{font-size:18px;font-weight:900}
.inv-lbl{font-size:9px;color:var(--txt3);margin-top:2px}

/* COMING SOON */
.coming-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;opacity:.65}
.coming-icon{width:38px;height:38px;background:var(--s3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.coming-body{flex:1}
.coming-title{font-size:13px;font-weight:700;margin-bottom:2px}
.coming-sub{font-size:11px;color:var(--txt3)}
.coming-tag{font-size:9px;font-weight:700;color:var(--txt3);background:var(--s3);border-radius:20px;padding:3px 9px;white-space:nowrap;flex-shrink:0}

/* FORM */
.req-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.form-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:540px){.form-grid-2{grid-template-columns:1fr 1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-lbl{font-size:11px;font-weight:600;color:var(--txt2)}
.form-inp{background:var(--s2);border:1.5px solid var(--border2);border-radius:var(--r2);padding:10px 12px;font-size:14px;color:var(--txt);outline:none;transition:border .15s;font-family:inherit;width:100%}
.form-inp:focus{border-color:var(--acc);background:#fff}
textarea.form-inp{resize:vertical;min-height:80px}
select.form-inp{cursor:pointer}
.form-submit{background:var(--acc);color:#fff;border:none;border-radius:var(--r2);padding:13px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:6px;transition:background .15s;-webkit-tap-highlight-color:transparent}
.form-submit:hover{background:var(--acc2)}
.form-note{font-size:11px;color:var(--txt3);text-align:center;margin-top:8px}

/* PROPERTY GROUP (for agencies/agents) */
.prop-group{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;box-shadow:var(--sh)}
.prop-group-hd{padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;-webkit-tap-highlight-color:transparent}
.prop-group-addr{font-size:14px;font-weight:700}
.prop-group-count{font-size:11px;color:var(--txt3)}
.prop-group-body{padding:8px 16px}

/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--txt3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:700;color:var(--txt2);margin-bottom:4px}
.empty-sub{font-size:12px}

/* FOOTER */
.footer{text-align:center;padding:24px 20px;color:var(--txt3);font-size:11px;border-top:1px solid var(--border);margin-top:12px}

/* SPINNER */
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;margin:80px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:var(--sh3)}
#toast.show{opacity:1}

/* LIGHTBOX */
#lb{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9998;display:none;align-items:center;justify-content:center}
#lb.show{display:flex}
#lb img{max-width:92vw;max-height:88vh;border-radius:var(--r2);box-shadow:var(--sh3)}
#lb-close{position:absolute;top:14px;right:18px;color:#fff;font-size:26px;cursor:pointer;font-weight:700;line-height:1}

/* PHOTO */
.photo-thumb{width:70px;height:70px;object-fit:cover;border-radius:8px;cursor:pointer;border:2px solid var(--border);transition:transform .2s;flex-shrink:0}
.photo-thumb:hover{transform:scale(1.07)}
@media(min-width:400px){.photo-thumb{width:80px;height:80px}}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">DF</div>
    <div class="hdr-name" id="hdr-co">DeepFlow</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-client" id="hdr-name"></div>
    <div class="hdr-badge" id="portal-badge">Portal</div>
  </div>
</div>

<div class="nav" id="nav" style="display:none">
  <div class="nav-tab active" data-tab="overview"  onclick="switchTab('overview')">📊 Overview</div>
  <div class="nav-tab"        data-tab="jobs"       onclick="switchTab('jobs')">🔧 Jobs</div>
  <div class="nav-tab"        data-tab="certs"      onclick="switchTab('certs')">📋 Certificates</div>
  <div class="nav-tab"        data-tab="invoices"   onclick="switchTab('invoices')">🧾 Invoices</div>
  <div class="nav-tab"        data-tab="request"    onclick="switchTab('request')">➕ Request</div>
</div>

<div class="main" id="main-content">
  <div class="spinner"></div>
</div>

<div class="footer">
  <div style="font-weight:800;font-size:11px;letter-spacing:.5px">DEEPFLOW</div>
  <div style="margin-top:4px">Secure Client Portal · <span id="footer-co"></span></div>
</div>

<div id="lb" onclick="closeLb()">
  <div id="lb-close" onclick="closeLb()">✕</div>
  <img id="lb-img" src="" alt="">
</div>
<div id="toast"></div>

<script>
// ── CORE ─────────────────────────────────────────────────────
const SB_URL='https://dzqyqpuhxdrrpipbehpk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6cXlxcHVoeGRycnBpcGJlaHBrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzMjksImV4cCI6MjA4ODQ1MjMyOX0.7ObsuqKv5gNX5r7Pz1x1gyGgugcX2W0zw3d9hC6osvI';

async function sb(path,opts={}){
  const r=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:opts.method||'GET',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json',
      'Prefer':opts.prefer||(opts.method==='POST'?'return=representation':'')},
    body:opts.body!==undefined?JSON.stringify(opts.body):undefined,
  });
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function _fix(j){
  if(!j||typeof j!=='object')return j;
  const M={jobnum:'jobNum',certtypes:'certTypes',timeslot:'timeSlot',
    landlordname:'landlordName',agencyname:'agencyName',agentname:'agentName',
    issuedate:'issueDate',expirydate:'expiryDate',certnum:'certNum',
    noexpiry:'noExpiry',jobid:'jobId',clientname:'clientName',
    duedate:'dueDate',createdat:'createdAt'};
  const r={};for(const[k,v]of Object.entries(j))r[M[k]||k]=v;return r;
}
function fmtDate(d){return d?new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):''}
function fmtGBP(n){return'£'+(n||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}
function daysDiff(d){return Math.ceil((new Date(d)-new Date())/86400000)}

// ── STATE ────────────────────────────────────────────────────
let _d=null; // portal data
let _certSort='expiry'; let _certDir='asc'; // sort state

const params=new URLSearchParams(location.search);
const token=params.get('id');
const ptype=params.get('type')||'landlord';

// ── INIT ─────────────────────────────────────────────────────
async function init(){
  if(!token){showErr('Invalid Link','This portal link is invalid or has expired. Please contact your service provider.');return;}
  try{
    let entity,jobs=[],attachments=[],certs=[],invoices=[];

    if(ptype==='agency'){
      const rows=await sb(`agencies?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','Link invalid or expired.');return;}
      entity=rows[0];
      document.getElementById('portal-badge').textContent='🏢 Agency';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?agencyname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);
    } else if(ptype==='agent'){
      // Agent: look up from agents table, then match jobs by agentname
      const rows=await sb(`agents?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','Link invalid or expired.');return;}
      entity=rows[0];
      document.getElementById('portal-badge').textContent='👤 Agent';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?agentname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);
    } else {
      // Landlord (default)
      const rows=await sb(`persons?id=eq.${encodeURIComponent(token)}&select=*`);
      if(!rows?.length){showErr('Not Found','Link invalid or expired. Contact your service provider.');return;}
      entity=rows[0];
      document.getElementById('portal-badge').textContent='🏠 Landlord';
      document.title=`${entity.name} — Portal`;
      const raw=await sb(`jobs?landlordname=ilike.${encodeURIComponent(entity.name)}&order=date.desc&select=*`);
      jobs=(raw||[]).map(_fix);
    }

    // Parallel fetch for all related data
    if(jobs.length){
      const idList=jobs.map(j=>`"${j.id}"`).join(',');
      const nameLower=(entity.name||'').toLowerCase();
      const [rawAtts,rawCerts,rawInvs]=await Promise.all([
        sb(`attachments?jobid=in.(${idList})&select=*`).catch(()=>[]),
        sb(`certs?jobid=in.(${idList})&select=*`).catch(()=>[]),
        sb(`invoices?select=id,number,status,items,createdat,date,clientname,landlordname,agencyname,agentname`).catch(()=>[]),
      ]);
      attachments=(rawAtts||[]).map(_fix);
      certs=(rawCerts||[]).map(_fix);
      invoices=(rawInvs||[]).map(_fix).filter(inv=>{
        const n=(inv.clientName||inv.landlordName||inv.agencyName||inv.agentName||'').toLowerCase();
        return n===nameLower||n.includes(nameLower);
      });
    }

    // Company name from settings
    let coName='Your Service Provider';
    try{
      const s=await sb(`app_settings?select=value&key=eq.settings`);
      if(s?.[0]?.value){const sd=typeof s[0].value==='string'?JSON.parse(s[0].value):s[0].value;if(sd.coName)coName=sd.coName;}
    }catch(e){}

    document.getElementById('hdr-co').textContent=coName;
    document.getElementById('hdr-name').textContent=entity.name;
    document.getElementById('footer-co').textContent=coName;

    _d={name:entity.name,type:ptype,jobs,attachments,certs,invoices,token,coName};
    document.getElementById('nav').style.display='flex';
    switchTab('overview');
  }catch(err){
    console.error(err);
    showErr('Connection Error','Could not load your portal. Please check your connection and try again.');
  }
}

function sortCerts(certs){
  const FAR_FUTURE=new Date('2099-01-01');
  return certs.sort((a,b)=>{
    let va,vb;
    if(_certSort==='expiry'){
      va=a.noExpiry||!a.expiryDate?FAR_FUTURE:new Date(a.expiryDate);
      vb=b.noExpiry||!b.expiryDate?FAR_FUTURE:new Date(b.expiryDate);
      return _certDir==='asc'?va-vb:vb-va;
    }
    if(_certSort==='type'){va=(a.type||'').toLowerCase();vb=(b.type||'').toLowerCase();}
    else if(_certSort==='address'){va=(a.address||'').toLowerCase();vb=(b.address||'').toLowerCase();}
    else if(_certSort==='certnum'){va=(a.certNum||'').toLowerCase();vb=(b.certNum||'').toLowerCase();}
    else if(_certSort==='issuedate'){
      va=a.issueDate?new Date(a.issueDate):new Date(0);
      vb=b.issueDate?new Date(b.issueDate):new Date(0);
      return _certDir==='asc'?va-vb:vb-va;
    }
    else if(_certSort==='status'){
      const order={exp:0,soon:1,valid:2,noexp:3};
      const rankC=c=>{if(!c.expiryDate||c.noExpiry)return 3;const d=daysDiff(c.expiryDate);return d<0?0:d<=60?1:2;};
      va=rankC(a);vb=rankC(b);
    }
    if(va===undefined)return 0;
    const cmp=va<vb?-1:va>vb?1:0;
    return _certDir==='asc'?cmp:-cmp;
  });
}

function certCardHtml(c,d){
  const iconMap={Gas:'🔥',EICR:'⚡',PAT:'🔌',EPC:'🏠',Fire:'🚒',Boiler:'🔧',Legionella:'💧',Asbestos:'⚗️'};
  const icon=Object.entries(iconMap).find(([k])=>(c.type||'').includes(k))?.[1]||'📄';
  const diff=(!c.noExpiry&&c.expiryDate)?daysDiff(c.expiryDate):null;
  const isExp=diff!==null&&diff<0;
  const isSoon=diff!==null&&diff>=0&&diff<=60;
  const pillCls=isExp?'p-exp':isSoon?'p-soon':'p-valid';
  const pillTxt=isExp?`Expired ${Math.abs(diff)}d ago`:isSoon?`${diff}d left`:'Valid';
  const expLine=!c.noExpiry&&c.expiryDate?`Exp. ${new Date(c.expiryDate).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`:c.noExpiry?'No expiry':'';
  const jobForCert=d.jobs.find(j=>j.id===c.jobId);
  return`<div class="cert-card">
    <div class="cert-icon-wrap">${icon}</div>
    <div class="cert-body">
      <div class="cert-type">${esc(c.type||'Certificate')}</div>
      <div class="cert-addr">${esc(c.address||(jobForCert?.address)||'—')}</div>
      <div class="cert-meta">
        <span class="pill ${pillCls}">${pillTxt}</span>
        ${expLine?`<span style="font-size:10px;color:var(--txt3)">${expLine}</span>`:''}
        ${c.certNum?`<span style="font-size:10px;color:var(--txt3)">Ref: ${esc(c.certNum)}</span>`:''}
      </div>
    </div>
    ${c.url?`<a href="${escA(c.url)}" target="_blank" class="cert-dl">⬇ Download</a>`
      :`<span class="cert-dl ghost" style="cursor:default;opacity:.5">No PDF</span>`}
  </div>`;
}

async function submitReq(){
  const addr=(document.getElementById('rq-addr')?.value||'').trim();
  const svc=(document.getElementById('rq-svc')?.value||'').trim();
  const date=document.getElementById('rq-date')?.value||'';
  const access=document.getElementById('rq-access')?.value||'';
  const notes=(document.getElementById('rq-notes')?.value||'').trim();
  if(!addr||!svc){toast('Please fill in address and service type');return;}
  const btn=document.getElementById('rq-btn');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const msg=`📩 Portal request from ${_d.name}\nService: ${svc}\nAddress: ${addr}`
      +(date?`\nDate: ${date}`:'')+( access?`\nAccess: ${access}`:'')+(notes?`\nNotes: ${notes}`:'');
    await sb('activity',{method:'POST',body:{id:'req-'+Date.now()+'-'+Math.random().toString(36).slice(2,6),msg,type:'request',ts:Date.now()},prefer:'return=minimal'});
    document.getElementById('req-wrap').innerHTML=`
      <div style="text-align:center;padding:28px 0">
        <div style="font-size:52px;margin-bottom:12px">✅</div>
        <div style="font-size:18px;font-weight:800;margin-bottom:6px">Request Submitted!</div>
        <div style="font-size:13px;color:var(--txt2);max-width:320px;margin:0 auto">${esc(_d.coName)} will be in touch within 1 working day to confirm your booking.</div>
        <button class="cert-dl" style="margin-top:18px" onclick="switchTab('overview')">← Back to Overview</button>
      </div>`;
  }catch(err){
    if(btn){btn.disabled=false;btn.textContent='📩 Submit Request';}
    toast('Could not send. Please call us directly.');
  }
}

// ── HELPERS ──────────────────────────────────────────────────
function statusBadge(s){
  const m={'Pending':'<span class="badge b-pend">⏳ Pending</span>',
    'In Progress':'<span class="badge b-prog">🔄 In Progress</span>',
    'Completed':'<span class="badge b-done">✅ Completed</span>',
    'Invoiced':'<span class="badge b-inv">🧾 Invoiced</span>',
    'Cancelled':'<span class="badge b-can">✕ Cancelled</span>'};
  return m[s]||`<span class="badge b-can">${esc(s||'—')}</span>`;
}

function calcInvTotal(inv){
  const items=typeof inv.items==='string'?JSON.parse(inv.items||'[]'):(inv.items||[]);
  return items.reduce((s,x)=>s+(x.qty||1)*(x.unit||0),0);
}

function comingSoon(title,sub,tag){
  return`<div class="coming-card">
    <div class="coming-icon">🔮</div>
    <div class="coming-body"><div class="coming-title">${title}</div><div class="coming-sub">${sub}</div></div>
    <div class="coming-tag">${tag}</div>
  </div>`;
}

function showErr(title,msg){
  document.getElementById('main-content').innerHTML=`
    <div class="empty" style="padding:80px 20px">
      <div class="empty-icon">🔒</div>
      <div class="empty-title">${esc(title)}</div>
      <div class="empty-sub">${esc(msg)}</div>
    </div>`;
}

function openLb(url){document.getElementById('lb-img').src=url;document.getElementById('lb').classList.add('show');}
function closeLb(){document.getElementById('lb').classList.remove('show');document.getElementById('lb-img').src='';}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});

let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='show';
  clearTimeout(_tt);_tt=setTimeout(()=>el.className='',3500);
}

init();
</script>
</body>
</html>
